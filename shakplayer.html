<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Shaka Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  height:100%;
  overflow:hidden;
}

.shaka-video-container{
  width:100%;
  height:100%;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="shaka-video-container" data-shaka-player-container>
  <video autoplay playsinline id="video"></video>
</div>

<script>
const video = document.getElementById("video");

// URL থেকে stream নেওয়া
const params = new URLSearchParams(window.location.search);
const streamUrl = params.get("url");

document.addEventListener("DOMContentLoaded", async () => {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Shaka Player not supported!");
    return;
  }

  const player = new shaka.Player(video);
  const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

  ui.configure({
    controlPanelElements: [
      'play_pause',
      'mute',
      'volume',
      'spacer',
      'quality',
      'fullscreen'
    ]
  });

  // DRM (optional)
  player.configure({
    drm: {
      clearKeys: {
        "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050"
      }
    }
  });

  try {
    if (streamUrl) {
      await player.load(streamUrl);
    } else {
      alert("No stream URL provided!");
    }
  } catch (e) {
    console.error(e);
    alert("Stream load failed!");
  }

});
</script>

</body>
</html>
