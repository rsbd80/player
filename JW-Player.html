<body>

    <!-- ===== LOADING OVERLAY ===== -->
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-ring-wrapper">
            <div class="loader-ring"></div>
        </div>
    </div>

    <!-- ===== VIDEO ===== -->
    <video id="player" playsinline muted autoplay></video>

    <!-- ===== PLYR + HLS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url');

            let plyr = null;
            let hls = null;
            let loadingHidden = false;

            // ----- hide loading -----
            function hideLoading() {
                if (loadingHidden) return;
                loadingHidden = true;
                overlay.classList.add('hidden');
            }

            // fallback: force hide after 5s
            const fallbackTimer = setTimeout(hideLoading, 5000);

            // ----- force no rotation (applied repeatedly) -----
            function forceNoRotation() {
                video.style.transform = 'none';
                video.style.rotate = '0deg';
                video.style.objectFit = 'cover';
            }

            // ----- PLYR INIT -----
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                });

                plyr.on('ready', forceNoRotation);

                // fullscreen events — force no rotation
                plyr.on('fullscreenchange', function() {
                    setTimeout(forceNoRotation, 100);
                });

                // native fullscreen events
                document.addEventListener('fullscreenchange', function() {
                    setTimeout(forceNoRotation, 100);
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    setTimeout(forceNoRotation, 100);
                });

                // also on resize / orientation
                window.addEventListener('resize', forceNoRotation);
                window.addEventListener('orientationchange', function() {
                    setTimeout(forceNoRotation, 150);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(forceNoRotation, 150);
                    });
                }

                // extra safety: mutation observer on video style
                const observer = new MutationObserver(function() {
                    if (video.style.transform !== 'none') {
                        forceNoRotation();
                    }
                });
                observer.observe(video, { attributes: true, attributeFilter: ['style'] });
            }

            // ----- HLS SETUP -----
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                        video.play().catch(function() {});
                    });

                    hls.on(Hls.Events.ERROR, function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                        video.play().catch(function() {});
                    });
                } else {
                    hideLoading();
                }
            }

            // ----- INIT -----
            document.addEventListener('DOMContentLoaded', function() {
                setupHls();
                initPlyr();

                // initial force
                forceNoRotation();

                // if video can play early
                video.addEventListener('canplay', function() {
                    clearTimeout(fallbackTimer);
                    hideLoading();
                });

                // extra: if loadeddata fires
                video.addEventListener('loadeddata', function() {
                    clearTimeout(fallbackTimer);
                    hideLoading();
                });

                // expose debug
                window.__rs = { video, plyr, hls, forceNoRotation, hideLoading };
            });

        })();
    </script>
</body>
