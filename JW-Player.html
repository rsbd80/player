<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>
    
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Main container - this rotates */
        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            transition: transform 0.4s ease;
            transform-origin: center center;
            z-index: 1;
        }

        /* Rotated state */
        #player-container.rotated {
            transform: rotate(90deg) scale(1.78);
        }

        /* Video fills container */
        #player {
            width: 100% !important;
            height: 100% !important;
            display: block;
            object-fit: cover !important;
            background: #000;
        }

        /* Plyr wrapper inside container */
        .plyr {
            width: 100% !important;
            height: 100% !important;
            position: relative !important;
        }

        .plyr--video {
            width: 100% !important;
            height: 100% !important;
            background: #000 !important;
        }

        .plyr__controls {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 10 !important;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)) !important;
            padding: 20px 10px 15px !important;
        }

        .plyr__controls button {
            color: #fff !important;
        }

        .plyr__control--overlaid {
            background: rgba(0, 0, 0, 0.6) !important;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #12121c 0%, #06060c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 10%, #8ad7ff 55%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.08);
            line-height: 1.2;
        }
        
        .loader-brand span {
            background: linear-gradient(90deg, #ff296d 0%, #ff5e00 45%, #ffd000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-sub {
            font-size: 8px;
            color: #5a6f89;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 2px;
            opacity: 0.5;
        }

        .loader-spinner {
            margin-top: 14px;
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #00f0ff;
            border-right-color: #ff296d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            position: relative;
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(0, 240, 255, 0.2);
            animation: spin 1.4s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-msg {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            display: none;
            text-align: center;
            max-width: 90%;
            font-weight: 500;
        }

        /* Rotate button */
        #rotate-btn {
            position: fixed;
            bottom: 70px;
            right: 20px;
            z-index: 50;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 16px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: background 0.3s;
            display: none;
        }

        #rotate-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #rotate-btn.active {
            background: rgba(0, 240, 255, 0.3);
            border-color: #00f0ff;
        }

        @media (max-width: 400px) {
            .loader-brand { font-size: 18px; }
            .loader-sub { font-size: 7px; letter-spacing: 2px; }
            .loader-spinner { width: 22px; height: 22px; margin-top: 10px; }
            #rotate-btn { padding: 10px 14px; font-size: 16px; bottom: 60px; right: 15px; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-spinner"></div>
    </div>

    <div id="error-msg"></div>

    <div id="player-container">
        <video id="player" playsinline muted autoplay></video>
    </div>

    <!-- Manual rotate button -->
    <button id="rotate-btn" title="Rotate Screen">↻</button>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const container = document.getElementById('player-container');
            const overlay = document.getElementById('loading-overlay');
            const errorMsg = document.getElementById('error-msg');
            const rotateBtn = document.getElementById('rotate-btn');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;
            let isRotated = false;
            let retryCount = 0;

            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                overlay.classList.add('hidden');
                rotateBtn.style.display = 'block';
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 8000);
            }

            // Core rotation function
            function toggleRotation() {
                isRotated = !isRotated;
                container.classList.toggle('rotated', isRotated);
                rotateBtn.classList.toggle('active', isRotated);
                
                // Force reflow for smooth transition
                container.style.transform = 'none';
                container.offsetHeight;
                container.style.transform = '';
            }

            function resetRotation() {
                isRotated = false;
                container.classList.remove('rotated');
                rotateBtn.classList.remove('active');
            }

            function tryAlternativeSource() {
                if (retryCount >= 2) {
                    showError('ভিডিও ব্লক করা হয়েছে। শুধু অডিও পাওয়া যাচ্ছে।');
                    return;
                }
                retryCount++;
                if (hls) {
                    hls.destroy();
                    hls = null;
                }
                setTimeout(() => setupHls(true), 1000);
            }

            function setupHls(forceReload = false) {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    try {
                        if (hls) {
                            hls.destroy();
                            hls = null;
                        }

                        hls = new Hls({
                            enableWorker: true,
                            lowLatencyMode: true,
                            backbufferLength: 30,
                            maxBufferLength: 30,
                            maxMaxBufferLength: 600,
                            liveSyncDurationCount: 3,
                            liveMaxLatencyDurationCount: 10,
                            enableWebVTT: false,
                            xhrSetup: function(xhr, url) {
                                xhr.withCredentials = false;
                                try {
                                    xhr.setRequestHeader('Origin', window.location.origin);
                                } catch(e) {}
                            }
                        });

                        hls.loadSource(videoSrc);
                        hls.attachMedia(video);

                        hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            hideLoading();
                            video.play().catch(function(e) {
                                console.warn('Autoplay prevented:', e);
                            });
                        });

                        hls.on(Hls.Events.ERROR, function(event, data) {
                            if (data.fatal) {
                                console.warn('HLS fatal error:', data);
                                switch (data.type) {
                                    case Hls.ErrorTypes.NETWORK_ERROR:
                                        if (data.response && data.response.code === 403) {
                                            showError('ভিডিও ব্লক করা হয়েছে');
                                            tryAlternativeSource();
                                        } else {
                                            hls.startLoad();
                                        }
                                        break;
                                    case Hls.ErrorTypes.MEDIA_ERROR:
                                        hls.recoverMediaError();
                                        break;
                                    default:
                                        hideLoading();
                                        break;
                                }
                            }
                        });

                        hls.on(Hls.Events.FRAG_LOADED, hideLoading);

                    } catch (e) {
                        console.error('HLS setup error:', e);
                        hideLoading();
                    }

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });
                } else {
                    hideLoading();
                    showError('এই ব্রাউজার HLS সাপোর্ট করে না');
                }
            }

            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    resetRotation();
                    setTimeout(hideLoading, 100);
                });

                // Handle fullscreen - rotate when entering fullscreen
                plyr.on('fullscreenchange', function() {
                    if (plyr.fullscreen.active) {
                        setTimeout(() => {
                            if (!isRotated) {
                                toggleRotation();
                            }
                        }, 300);
                    } else {
                        resetRotation();
                    }
                });

                // Handle escape key
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && isRotated) {
                        resetRotation();
                        if (plyr && plyr.fullscreen && plyr.fullscreen.active) {
                            plyr.fullscreen.exit();
                        }
                    }
                });

                // Handle orientation change
                window.addEventListener('orientationchange', function() {
                    setTimeout(function() {
                        if (plyr && plyr.fullscreen && plyr.fullscreen.active) {
                            if (!isRotated) {
                                toggleRotation();
                            }
                        }
                    }, 400);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(function() {
                            if (plyr && plyr.fullscreen && plyr.fullscreen.active) {
                                if (!isRotated) {
                                    toggleRotation();
                                }
                            }
                        }, 400);
                    });
                }

                // Override fullscreen button
                const fsButton = document.querySelector('.plyr__control[data-plyr="fullscreen"]');
                if (fsButton) {
                    fsButton.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        if (plyr.fullscreen.active) {
                            plyr.fullscreen.exit();
                            resetRotation();
                        } else {
                            plyr.fullscreen.enter();
                            setTimeout(() => {
                                if (plyr.fullscreen.active && !isRotated) {
                                    toggleRotation();
                                }
                            }, 300);
                        }
                    });
                }
            }

            function handleVideoIssues() {
                video.addEventListener('loadedmetadata', function() {
                    if (video.videoWidth === 0 || video.videoHeight === 0) {
                        console.warn('Video has no dimensions - audio-only stream');
                        setTimeout(hideLoading, 1000);
                    }
                    video.style.objectFit = 'cover';
                });

                video.addEventListener('stalled', function() {
                    if (hls) {
                        hls.startLoad();
                    }
                });

                setTimeout(() => {
                    if (!isHidden && video.readyState < 2) {
                        tryAlternativeSource();
                    }
                }, 10000);
            }

            // Start
            document.addEventListener('DOMContentLoaded', function() {
                loadingTimeout = setTimeout(hideLoading, 5000);

                setupHls();
                handleVideoIssues();
                initPlyr();

                video.addEventListener('canplay', hideLoading);
                video.addEventListener('loadeddata', hideLoading);
                video.addEventListener('playing', hideLoading);

                // Manual rotate button
                rotateBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleRotation();
                });

                video.style.objectFit = 'cover';

                // Expose for debugging
                window.__RS = { 
                    video, 
                    plyr, 
                    hls, 
                    toggleRotation, 
                    resetRotation,
                    isRotated: () => isRotated
                };
            });

        })();
    </script>
</body>
</html>
