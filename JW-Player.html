<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>

    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: contain !important;
            /* 🔄 রোটেশন সাপোর্ট (JS দিয়ে কন্ট্রোল) */
            transform-origin: center center;
            transition: transform 0.25s ease;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        .plyr__controls { z-index: 20; }

        /* LOADING */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #12121c 0%, #06060c 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .loader-brand {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(135deg, #ffffff 10%, #8ad7ff 55%, #00f0ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        .loader-brand span {
            background: linear-gradient(90deg, #ff296d 0%, #ff5e00 45%, #ffd000 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .loader-sub {
            font-size: 9px; color: #5a6f89; letter-spacing: 3px;
            text-transform: uppercase; font-weight: 500; margin-top: 3px; opacity: 0.5;
        }
        .loader-spinner {
            margin-top: 16px; width: 30px; height: 30px;
            border: 2.5px solid rgba(255,255,255,0.06);
            border-top-color: #00f0ff;
            border-right-color: #ff296d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FULLSCREEN: রোটেশন ব্রাউজার নিজেই সামলাবে */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
            transform: none !important;
            transform-origin: center center !important;
        }

        video:fullscreen,
        video:-webkit-full-screen,
        video:-moz-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
            transform: none !important;
            transform-origin: center center !important;
        }

        @media (max-width: 400px) {
            .loader-brand { font-size: 20px; }
            .loader-sub { font-size: 8px; letter-spacing: 2px; }
            .loader-spinner { width: 24px; height: 24px; margin-top: 12px; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-spinner"></div>
    </div>

    <video id="player" playsinline muted autoplay></video>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            // 📌 URL থেকে ভিডিও সোর্স নেওয়া
            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;

            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
                overlay.classList.add('hidden');
            }

            // ===== ✅ রোটেশন ডিটেক্ট ও অ্যাপ্লাই =====
            function applyRotation() {
                if (!video) return;

                let angle = 0;

                // 1) screen.orientation API (মডার্ন)
                if (screen.orientation) {
                    const type = screen.orientation.type;
                    if (type === 'landscape-primary') angle = 90;
                    else if (type === 'landscape-secondary') angle = -90;
                    else if (type === 'portrait-secondary') angle = 180;
                }
                // 2) window.orientation (iOS Safari)
                else if (typeof window.orientation !== 'undefined') {
                    angle = window.orientation;
                }
                // 3) fallback
                else {
                    angle = window.innerWidth > window.innerHeight ? 90 : 0;
                }

                // ফুলস্ক্রিন চেক
                const isFullscreen = !!(document.fullscreenElement || 
                                        document.webkitFullscreenElement || 
                                        document.mozFullScreenElement);

                if (!isFullscreen) {
                    video.style.transform = `rotate(${angle}deg)`;
                } else {
                    video.style.transform = 'none';
                }
                video.style.objectFit = 'contain';

                console.log(`🔄 Rotation: ${angle}° (Fullscreen: ${isFullscreen})`);
            }

            // ===== PLYR =====
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    applyRotation();
                    setTimeout(hideLoading, 100);
                });

                plyr.on('fullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });

                document.addEventListener('fullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });

                window.addEventListener('orientationchange', function() {
                    setTimeout(applyRotation, 150);
                    setTimeout(applyRotation, 350);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(applyRotation, 150);
                        setTimeout(applyRotation, 350);
                    });
                }

                window.addEventListener('resize', function() {
                    setTimeout(applyRotation, 100);
                });

                setInterval(applyRotation, 1000);
            }

            // ===== HLS =====
            function setupHls() {
                if (!videoSrc) { hideLoading(); return; }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backbufferLength: 30,
                        maxBufferLength: 30,
                        liveSyncDurationCount: 3,
                        liveMaxLatencyDurationCount: 10,
                        enableWebVTT: false,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        hideLoading();
                        applyRotation();
                        video.play().catch(function(e) { console.warn('Autoplay prevented:', e); });
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                                case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                                default: hideLoading(); break;
                            }
                        }
                    });

                    hls.on(Hls.Events.FRAG_LOADED, function() {
                        hideLoading();
                        applyRotation();
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        applyRotation();
                        video.play().catch(function(e) { console.warn('Autoplay prevented:', e); });
                    });
                } else {
                    hideLoading();
                }
            }

            video.addEventListener('canplay', function() { hideLoading(); applyRotation(); });
            video.addEventListener('loadeddata', function() { hideLoading(); applyRotation(); });
            video.addEventListener('playing', function() { hideLoading(); applyRotation(); });

            document.addEventListener('DOMContentLoaded', function() {
                loadingTimeout = setTimeout(hideLoading, 4000);
                setupHls();
                initPlyr();
                applyRotation();

                window.__RS = { video, plyr, hls, applyRotation, hideLoading };
                console.log('✅ RS Live TV · Rotation ENABLED · Fullscreen OK');
                console.log('📺 Video Source:', videoSrc);
            });

        })();
    </script>
</body>
</html>
