<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">  
    <title>RS Player Pro - Advanced Loader</title>  
    
    <!-- JW Player Library -->
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>  
    <script>  
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";  
    </script>  

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">  

    <style>  
        * { margin:0; padding:0; box-sizing:border-box; }  
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }  
          
        #player-wrapper {   
            position: relative;   
            width: 100%;   
            height: 100%;   
            overflow: hidden;   
            background: #000;   
        }  

        /* প্লেয়ারকে পারফেক্টলি স্ট্রেচ করার জন্য ১-২ পিক্সেল বাইরে পাঠানো হয়েছে */  
        #player {   
            width: 100.6% !important;   
            height: 100.6% !important;   
            position: absolute;   
            top: -0.3% !important;   
            left: -0.3% !important;   
        }  

        /* --- কন্ট্রোলার কাস্টমাইজেশন --- */  
        .jw-skin-glow .jw-display-icon-container {   
            background: rgba(255, 255, 255, 0.1) !important;   
            border: 1px solid rgba(255, 255, 255, 0.2);   
            backdrop-filter: none !important;   
        }  
        .jw-skin-glow .jw-button-color { color: #ffffff !important; }  
        .jw-skin-glow .jw-controlbar {   
            background: transparent !important;   
            backdrop-filter: none !important;   
        }  

        /* --- লোডার ডিজাইন --- */  
        #loader {  
            position: absolute; top:0; left:0; width:100%; height:100%;  
            background: #000; display:flex; justify-content:center; align-items:center;  
            z-index:99; flex-direction: column; transition: opacity 0.3s ease, visibility 0.3s ease;  
        }  

        .loader-container {  
            position: relative;   
            width: 100px;   
            height: 100px;   
            display: flex; justify-content: center; align-items: center;  
        }  

        .loader-brand { text-align: center; z-index: 10; }  
        .tv-icon { font-size: 24px; color: #00c3ff; text-shadow: 0 0 10px #00c3ff; }   
        .brand-name { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }  
        .brand-name span { color: #00c3ff; }  

        .neon-ring {  
            position: absolute; width: 100%; height: 100%;  
            border-radius: 50%; border: 2px solid transparent;  
            animation: rotate-vortex 1.5s linear infinite;  
        }  
        .neon-ring:nth-child(1) { border-top: 2px solid #00c3ff; border-right: 2px solid #00c3ff; box-shadow: 0 0 10px #00c3ff; }  
        .neon-ring:nth-child(2) { border-bottom: 2px solid #ff007f; border-left: 2px solid #ff007f; animation-direction: reverse; animation-duration: 2s; box-shadow: 0 0 10px #ff007f; }  

        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }  

        .loading-text { color: rgba(255, 255, 255, 0.6); font-size: 10px; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; }  

        /* ভিডিওকে ফুলস্ক্রিন স্ট্রেচিং মোডে রাখা হয়েছে */  
        .jw-video.jw-reset {   
            object-fit: fill !important;   
        }  
          
        .hide-now { opacity: 0 !important; visibility: hidden !important; pointer-events: none; }  

        /* এরর মেসেজ ও বাটন */  
        .error-content { text-align: center; color: #fff; z-index: 100; padding: 20px; }  
        .error-content i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,77,77,0.5); }  
        .error-content p { font-size: 14px; margin-bottom: 15px; font-weight: 500; }
        
        .btn-retry {
            background: #00c3ff; color: #000; border: none; padding: 8px 18px; 
            border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; margin-bottom: 15px;
        }
        .btn-retry:hover { background: #fff; box-shadow: 0 0 10px #00c3ff; }
    </style>
</head>  
<body>  

<div id="player-wrapper">  
    <div id="loader">  
        <div id="loader-dynamic-area" style="display: flex; flex-direction: column; align-items: center;">
            <div class="loader-container">  
                <div class="neon-ring"></div>  
                <div class="neon-ring"></div>  
                <div class="loader-brand">  
                    <i class="fas fa-tv tv-icon"></i>  
                    <div class="brand-name">RS LIVE <span>TV</span></div>  
                </div>  
            </div>  
            <div class="loading-text">BUFFERING...</div>  
        </div>
    </div>  
    <div id="player"></div>  
</div>  

<script>  
    const urlParams = new URLSearchParams(window.location.search);  
    const streamSource = urlParams.get('url');  
    const loader = document.getElementById("loader");
    const loaderDynamicArea = document.getElementById("loader-dynamic-area");
  
    if (streamSource) {  
        const player = jwplayer("player").setup({  
            playlist: [{ file: streamSource, type: "hls" }],  
            width: "100%",  
            height: "100%",  
            autostart: true,  
            muted: true, /* ব্রাউজারের অটো-প্লে পলিসি বাইপাস করার জন্য ডিফল্ট মিউট করা হলো */
            stretching: "exactfit",  
            skin: { name: "glow" },  
            displaytitle: false,
            liveTimeout: 20 /* লাইভ স্ট্রিম ড্রপ হলে ২০ সেকেন্ড ট্রাই করবে */
        });  
  
        // স্ট্রিম প্লে হওয়া মাত্রই আনমিউট এবং ফুল ভলিউম হবে
        player.on("play", () => {  
            loader.classList.add("hide-now");  
            player.setMute(false);  
            player.setVolume(100);  
        });  
  
        // বাফারিং শুরু হলে আবার লোডার আসবে
        player.on("buffer", () => {  
            loader.classList.remove("hide-now");  
        });  

        // বাফারিং শেষ হয়ে প্লে ব্যাক শুরু হলে লোডার চলে যাবে
        player.on("bufferChange", (e) => {
            if(player.getState() === "playing") {
                loader.classList.add("hide-now");
            }
        });
  
        // স্ট্রিম অফলাইন বা এরর হ্যান্ডলিং
        player.on("error", () => {  
            loader.classList.remove("hide-now");   
            loaderDynamicArea.innerHTML = `  
                <div class="error-content">  
                    <i class="fas fa-exclamation-triangle"></i>  
                    <p>Stream Offline or Failed!</p>  
                    <button class="btn-retry" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> Try Reconnecting</button>
                    <div class="brand-name">RS LIVE <span>TV</span></div>  
                </div>  
            `;  
        });  
  
    } else {  
        loaderDynamicArea.innerHTML = `
            <div class="error-content">
                <i class="fas fa-link" style="color:#00c3ff;"></i>
                <div class="brand-name" style="font-size:14px;">No Stream URL Found</div>
            </div>
        `;  
    }  
</script>  

</body>  
</html>
