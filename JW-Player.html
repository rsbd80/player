<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Video Player - Strong Rotation Lock */
        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: cover;
            transform: none !important;
            rotate: 0deg !important;
            -webkit-transform: none !important;
            -webkit-rotate: 0deg !important;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
            transform: none !important;
            rotate: 0deg !important;
        }

        .plyr__controls {
            z-index: 20;
        }

        /* Fullscreen Override - Super Strong */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            transform: none !important;
            rotate: 0deg !important;
            -webkit-transform: none !important;
            -webkit-rotate: 0deg !important;
        }

        :-webkit-full-screen .plyr--video,
        :-moz-full-screen .plyr--video,
        :fullscreen .plyr--video {
            transform: none !important;
            rotate: 0deg !important;
            -webkit-transform: none !important;
            -webkit-rotate: 0deg !important;
        }

        video:fullscreen,
        video:-webkit-full-screen,
        video:-moz-full-screen {
            transform: none !important;
            rotate: 0deg !important;
            -webkit-transform: none !important;
            -webkit-rotate: 0deg !important;
        }

        /* Loading Overlay - Modern Design */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Brand Text - Glowing Effect */
        .loader-brand {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc, #ff6b9d, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            position: relative;
        }

        .loader-brand span {
            background: linear-gradient(90deg, #ff6b9d, #ffd93d, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 2s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Subtitle - Minimal & Clean */
        .loader-sub {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 4px;
            animation: pulseText 2s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Spinner - Clean & Modern */
        .loader-spinner {
            margin-top: 20px;
            position: relative;
            width: 40px;
            height: 40px;
        }

        .loader-spinner::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #00d4ff;
            border-right: 3px solid #7b2ffc;
            animation: spin 0.8s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.03);
            border-bottom: 3px solid #ff6b9d;
            border-left: 3px solid #ffd93d;
            animation: spin 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading Progress Bar */
        .loader-progress {
            margin-top: 30px;
            width: 120px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc, #ff6b9d);
            border-radius: 2px;
            animation: progressBar 1.5s ease-in-out infinite;
        }

        @keyframes progressBar {
            0% { left: -100%; width: 30%; }
            50% { left: 0%; width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        @media (max-width: 400px) {
            .loader-brand {
                font-size: 22px;
            }
            .loader-sub {
                font-size: 8px;
                letter-spacing: 3px;
            }
            .loader-spinner {
                width: 30px;
                height: 30px;
            }
            .loader-progress {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">Streaming Now</div>
        <div class="loader-spinner"></div>
        <div class="loader-progress"></div>
    </div>

    <!-- Video Element -->
    <video id="player" playsinline muted autoplay></video>

    <!-- Plyr + HLS -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;
            let rotationCheckInterval = null;

            // Hide Loading
            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                
                overlay.classList.add('hidden');
            }

            // Super Strong Rotation Lock
            function lockRotation() {
                // Direct element style
                video.style.transform = 'none';
                video.style.rotate = '0deg';
                video.style.webkitTransform = 'none';
                video.style.webkitRotate = '0deg';
                video.style.objectFit = 'cover';
                
                // Force via CSSOM
                video.style.setProperty('transform', 'none', 'important');
                video.style.setProperty('rotate', '0deg', 'important');
                video.style.setProperty('-webkit-transform', 'none', 'important');
                video.style.setProperty('-webkit-rotate', '0deg', 'important');
                
                // Also fix container if exists
                const container = video.closest('.plyr');
                if (container) {
                    container.style.transform = 'none';
                    container.style.rotate = '0deg';
                }
            }

            // Initialize Plyr with Auto-play
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    duration: null,
                    displayDuration: true,
                    invertTime: false,
                    toggleInvert: false,
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    lockRotation();
                    // Force video to play
                    video.play().catch(function(e) {
                        console.warn('Autoplay prevented:', e);
                        // Retry after user interaction
                        document.addEventListener('click', function playOnClick() {
                            video.play().catch(function() {});
                            document.removeEventListener('click', playOnClick);
                        }, { once: true });
                    });
                    setTimeout(hideLoading, 200);
                });

                // Fullscreen events - Strong lock
                plyr.on('fullscreenchange', function() {
                    setTimeout(lockRotation, 10);
                    setTimeout(lockRotation, 50);
                    setTimeout(lockRotation, 100);
                });

                // Native fullscreen events
                document.addEventListener('fullscreenchange', function() {
                    setTimeout(lockRotation, 10);
                    setTimeout(lockRotation, 50);
                    setTimeout(lockRotation, 100);
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    setTimeout(lockRotation, 10);
                    setTimeout(lockRotation, 50);
                    setTimeout(lockRotation, 100);
                });

                // Orientation / resize
                window.addEventListener('resize', function() {
                    setTimeout(lockRotation, 20);
                });
                window.addEventListener('orientationchange', function() {
                    setTimeout(lockRotation, 50);
                    setTimeout(lockRotation, 150);
                });

                // Screen orientation API
                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(lockRotation, 50);
                        setTimeout(lockRotation, 150);
                    });
                }

                // MutationObserver for style changes
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                            const transform = video.style.transform;
                            const rotate = video.style.rotate;
                            if ((transform && transform !== 'none') || (rotate && rotate !== '0deg')) {
                                lockRotation();
                            }
                        }
                    });
                });
                observer.observe(video, { attributes: true, attributeFilter: ['style'] });

                // Continuous rotation check (every 200ms)
                if (rotationCheckInterval) {
                    clearInterval(rotationCheckInterval);
                }
                rotationCheckInterval = setInterval(function() {
                    const transform = video.style.transform;
                    const rotate = video.style.rotate;
                    if ((transform && transform !== 'none') || (rotate && rotate !== '0deg')) {
                        lockRotation();
                    }
                }, 200);

                // Click/Touch prevention
                video.addEventListener('click', function(e) {
                    e.preventDefault();
                    lockRotation();
                });

                video.addEventListener('touchstart', function(e) {
                    lockRotation();
                });
            }

            // Setup HLS
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backbufferLength: 30,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 600,
                        liveSyncDurationCount: 3,
                        liveMaxLatencyDurationCount: 10,
                        enableWebVTT: false,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });

                    hls.on(Hls.Events.FRAG_LOADED, function() {
                        hideLoading();
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.warn('HLS fatal error:', data);
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hls.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hideLoading();
                                    break;
                            }
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });
                } else {
                    hideLoading();
                }
            }

            // Start
            document.addEventListener('DOMContentLoaded', function() {
                loadingTimeout = setTimeout(hideLoading, 4000);

                setupHls();
                initPlyr();
                lockRotation();

                // Additional events
                video.addEventListener('canplay', function() {
                    hideLoading();
                    video.play().catch(function() {});
                });
                video.addEventListener('loadeddata', function() {
                    hideLoading();
                });
                video.addEventListener('playing', function() {
                    hideLoading();
                });

                // Expose for debugging
                window.__RS = { video, plyr, hls, lockRotation, hideLoading };
            });

        })();
    </script>
</body>
</html>
