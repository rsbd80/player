<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RS Player Pro</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}
#player{
    width:100%;
    height:100%;
}
#loader{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}
.spinner{
    width:60px;
    height:60px;
    border:4px solid rgba(255,255,255,.2);
    border-top:4px solid #00c3ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
#status{
    margin-top:15px;
    color:#fff;
    font-family:sans-serif;
    font-size:14px;
}
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="status">Loading Stream...</div>
</div>

<div id="player"></div>

<script>

const params = new URLSearchParams(window.location.search);
const streamUrl = params.get("url");

const loader = document.getElementById("loader");
const statusText = document.getElementById("status");

if(!streamUrl){
    statusText.innerText = "No Stream URL Found";
}else{

    const player = jwplayer("player").setup({
        file: streamUrl,
        type: "hls",
        width: "100%",
        height: "100%",
        autostart: true,
        mute: false,
        preload: "auto",
        primary: "html5",
        stretching: "uniform",
        hlshtml: true,
        displaytitle: false,
        displaydescription: false,
        controls: true
    });

    player.on("ready", function(){
        console.log("Player Ready");
    });

    player.on("play", function(){
        loader.style.display = "none";
    });

    player.on("buffer", function(){
        loader.style.display = "flex";
        statusText.innerText = "Buffering...";
    });

    player.on("bufferChange", function(e){
        console.log("Buffer:", e.bufferPercent);
    });

    player.on("error", function(e){
        console.log("ERROR:", e);

        loader.style.display = "flex";
        statusText.innerText = "Stream Error";
    });

    player.on("warning", function(e){
        console.log("WARNING:", e);
    });

    player.on("idle", function(){
        console.log("Player Idle");
    });

    setInterval(function(){

        const pos = player.getPosition();
        const dur = player.getDuration();

        console.log("Position:", pos, "Duration:", dur);

    },5000);
}
</script>

</body>
</html>
