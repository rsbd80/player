<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>
    
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: cover;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        /* ALLOW ROTATION IN FULLSCREEN */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
            transform: none !important;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader-spinner"></div>
    </div>

    <video id="player" playsinline muted autoplay></video>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let loadingHidden = false;

            function hideLoading() {
                if (loadingHidden) return;
                loadingHidden = true;
                overlay.classList.add('hidden');
            }

            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                });

                plyr.on('ready', function() {
                    video.play().catch(function() {});
                });

                // ONLY hide when video actually plays
                video.addEventListener('playing', function() {
                    hideLoading();
                });

                // Fullscreen - allow rotation
                plyr.on('fullscreenchange', function() {
                    // Let device handle rotation naturally
                });
            }

            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(function() {});
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            // Still show loading, don't hide
                            console.warn('HLS Error:', data);
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        video.play().catch(function() {});
                    });
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                setupHls();
                initPlyr();

                // NO AUTO HIDE - Loading will only hide when video plays
            });

        })();
    </script>
</body>
</html>
