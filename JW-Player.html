<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Player</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        #player-container {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        /* ফুলস্ক্রিন ফিক্স */
        :-webkit-full-screen { width: 100% !important; height: 100% !important; }
        :-moz-full-screen { width: 100% !important; height: 100% !important; }
        :fullscreen { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="player-container">
        <iframe id="player-iframe" src="about:blank" allowfullscreen></iframe>
    </div>
    
    <script>
        // URL থেকে চ্যানেল প্যারামিটার নিন
        const urlParams = new URLSearchParams(window.location.search);
        const channelUrl = urlParams.get('url');
        
        // প্লেয়ার URL তৈরি করুন
        const playerBase = "https://rs-player.netlify.app/jw-player?url=";
        const iframe = document.getElementById('player-iframe');
        
        if (channelUrl) {
            iframe.src = playerBase + encodeURIComponent(channelUrl);
        } else {
            // ডিফল্ট চ্যানেল (T Sports)
            const defaultUrl = "https://flussonic.deltainfonet.com/01_Tsports_HD/tracks-v1a1/mono.m3u8";
            iframe.src = playerBase + encodeURIComponent(defaultUrl);
        }
        
        // 🔥 অটো ফুলস্ক্রিন (ভিডিও প্লেয়ারে)
        function goFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen().catch(() => {});
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            } else if (el.msRequestFullscreen) {
                el.msRequestFullscreen();
            }
        }
        
        // ক্লিক/টাচে ফুলস্ক্রিন
        document.addEventListener('click', goFullscreen, { once: true });
        document.addEventListener('touchstart', goFullscreen, { once: true });
        
        // রোটেশনে ফুলস্ক্রিন ধরে রাখুন
        window.addEventListener('orientationchange', function() {
            setTimeout(goFullscreen, 500);
        });
        
        // ফুলস্ক্রিন থেকে বের হলে আবার ফুলস্ক্রিন
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                setTimeout(goFullscreen, 300);
            }
        });
    </script>
</body>
</html>
