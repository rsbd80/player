<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV · Rotate</title>

    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ===== VIDEO: ROTATION ENABLED ===== */
        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: contain !important;
            /* 🔄 ROTATION ENABLED */
            transform-origin: center center;
            transition: transform 0.25s ease;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        .plyr__controls {
            z-index: 20;
        }

        /* ===== LOADING ===== */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #12121c 0%, #06060c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 10%, #8ad7ff 55%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.08);
            line-height: 1.2;
        }
        .loader-brand span {
            background: linear-gradient(90deg, #ff296d 0%, #ff5e00 45%, #ffd000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader-sub {
            font-size: 8px;
            color: #5a6f89;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 2px;
            opacity: 0.5;
        }
        .loader-spinner {
            margin-top: 14px;
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #00f0ff;
            border-right-color: #ff296d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            position: relative;
        }
        .loader-spinner::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(0, 240, 255, 0.2);
            animation: spin 1.4s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== FULLSCREEN: ROTATION ALLOWED ===== */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: contain !important;
            /* ✅ ROTATION ALLOWED via JS */
            transform: none !important;
            transform-origin: center center !important;
        }

        video:fullscreen,
        video:-webkit-full-screen,
        video:-moz-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
            transform: none !important;
            transform-origin: center center !important;
        }

        /* iOS Safari */
        @supports (-webkit-touch-callout: none) {
            #player:-webkit-full-screen {
                width: 100% !important;
                height: 100% !important;
                object-fit: contain !important;
                transform: none !important;
                transform-origin: center center !important;
            }
        }

        @media (max-width: 400px) {
            .loader-brand { font-size: 18px; }
            .loader-sub { font-size: 7px; letter-spacing: 2px; }
            .loader-spinner { width: 22px; height: 22px; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <!-- LOADING -->
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-spinner"></div>
    </div>

    <!-- VIDEO -->
    <video id="player" playsinline muted autoplay></video>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;

            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                overlay.classList.add('hidden');
            }

            // ===== ROTATION: DETECT ORIENTATION & APPLY =====
            function applyRotation() {
                if (!video) return;

                let angle = 0;

                // 1) screen.orientation API (modern)
                if (screen.orientation) {
                    const type = screen.orientation.type;
                    if (type === 'landscape-primary') angle = 90;
                    else if (type === 'landscape-secondary') angle = -90;
                    else if (type === 'portrait-secondary') angle = 180;
                    // portrait-primary = 0
                }
                // 2) window.orientation (iOS Safari, old)
                else if (typeof window.orientation !== 'undefined') {
                    angle = window.orientation; // 0, 90, -90, 180
                }
                // 3) fallback: width vs height
                else {
                    angle = window.innerWidth > window.innerHeight ? 90 : 0;
                }

                // Apply rotation (BUT never in fullscreen — browser handles it)
                // Check if we're in fullscreen — if so, let browser handle
                const isFullscreen = document.fullscreenElement || 
                                    document.webkitFullscreenElement || 
                                    document.mozFullScreenElement;

                if (!isFullscreen) {
                    video.style.transform = `rotate(${angle}deg)`;
                    video.style.objectFit = 'contain';
                } else {
                    // In fullscreen, browser handles rotation natively
                    // Just ensure object-fit
                    video.style.objectFit = 'contain';
                }

                console.log(`🔄 Rotation: ${angle}° (Fullscreen: ${!!isFullscreen})`);
            }

            // ===== PLYR =====
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    applyRotation();
                    setTimeout(hideLoading, 100);
                });

                // ===== FULLSCREEN: ROTATE WITH BROWSER =====
                plyr.on('fullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });

                // Native fullscreen events
                document.addEventListener('fullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });
                document.addEventListener('mozfullscreenchange', function() {
                    setTimeout(applyRotation, 100);
                    setTimeout(applyRotation, 300);
                });

                // Orientation change
                window.addEventListener('orientationchange', function() {
                    setTimeout(applyRotation, 150);
                    setTimeout(applyRotation, 350);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(applyRotation, 150);
                        setTimeout(applyRotation, 350);
                    });
                }

                window.addEventListener('resize', function() {
                    setTimeout(applyRotation, 100);
                });

                // Periodic check
                setInterval(applyRotation, 1000);
            }

            // ===== HLS =====
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backbufferLength: 30,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 600,
                        liveSyncDurationCount: 3,
                        liveMaxLatencyDurationCount: 10,
                        enableWebVTT: false,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        hideLoading();
                        applyRotation();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.warn('HLS fatal error:', data);
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hls.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hideLoading();
                                    break;
                            }
                        }
                    });

                    hls.on(Hls.Events.FRAG_LOADED, function() {
                        hideLoading();
                        applyRotation();
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        applyRotation();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });
                } else {
                    hideLoading();
                }
            }

            // ===== VIDEO EVENTS =====
            video.addEventListener('canplay', function() {
                hideLoading();
                applyRotation();
            });

            video.addEventListener('loadeddata', function() {
                hideLoading();
                applyRotation();
            });

            video.addEventListener('playing', function() {
                hideLoading();
                applyRotation();
            });

            // ===== START =====
            document.addEventListener('DOMContentLoaded', function() {
                loadingTimeout = setTimeout(hideLoading, 4000);
                setupHls();
                initPlyr();
                applyRotation();

                window.__RS = { video, plyr, hls, applyRotation, hideLoading };
                console.log('✅ RS Live TV · Rotation ENABLED + No Crop');
            });

        })();
    </script>
</body>
</html>
