<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Video Player - Allow Rotation in Fullscreen */
        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: cover;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        .plyr__controls {
            z-index: 20;
        }

        /* Fullscreen - Allow Rotation */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
        }

        :-webkit-full-screen .plyr--video,
        :-moz-full-screen .plyr--video,
        :fullscreen .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Loading Overlay - Pure Animation Only */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Loading Animation */
        .loader-spinner {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .loader-spinner::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #00d4ff;
            border-right: 3px solid #7b2ffc;
            animation: spin 0.8s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.03);
            border-bottom: 3px solid #ff6b9d;
            border-left: 3px solid #ffd93d;
            animation: spin 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }

        .loader-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, #00d4ff, #7b2ffc);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
        }

        /* Progress Bar */
        .loader-progress {
            margin-top: 40px;
            width: 150px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress-bar {
            position: absolute;
            left: -100%;
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc, #ff6b9d);
            border-radius: 2px;
            animation: progressBar 1.5s ease-in-out infinite;
        }

        @keyframes progressBar {
            0% { left: -100%; width: 30%; }
            50% { left: 0%; width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        @media (max-width: 400px) {
            .loader-spinner {
                width: 40px;
                height: 40px;
            }
            .loader-spinner::after {
                inset: 6px;
            }
            .loader-dot {
                width: 8px;
                height: 8px;
            }
            .loader-progress {
                width: 100px;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-spinner">
            <div class="loader-dot"></div>
        </div>
        <div class="loader-progress">
            <div class="loader-progress-bar"></div>
        </div>
    </div>

    <!-- Video Element -->
    <video id="player" playsinline muted autoplay></video>

    <!-- Plyr + HLS -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;

            // Hide Loading
            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                
                overlay.classList.add('hidden');
            }

            // Initialize Plyr with Auto-play
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    duration: null,
                    displayDuration: true,
                    invertTime: false,
                    toggleInvert: false,
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    video.play().catch(function(e) {
                        console.warn('Autoplay prevented:', e);
                    });
                    setTimeout(hideLoading, 200);
                });

                // Fullscreen - Allow rotation naturally
                plyr.on('fullscreenchange', function() {
                    // Let the device handle rotation naturally
                });

                // Hide loading on play
                video.addEventListener('playing', function() {
                    hideLoading();
                });
            }

            // Setup HLS
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backbufferLength: 30,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 600,
                        liveSyncDurationCount: 3,
                        liveMaxLatencyDurationCount: 10,
                        enableWebVTT: false,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });

                    hls.on(Hls.Events.FRAG_LOADED, function() {
                        hideLoading();
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.warn('HLS fatal error:', data);
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hls.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hideLoading();
                                    break;
                            }
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });
                } else {
                    hideLoading();
                }
            }

            // Start
            document.addEventListener('DOMContentLoaded', function() {
                loadingTimeout = setTimeout(hideLoading, 4000);

                setupHls();
                initPlyr();

                // Additional events
                video.addEventListener('canplay', function() {
                    hideLoading();
                    video.play().catch(function() {});
                });
                video.addEventListener('loadeddata', function() {
                    hideLoading();
                });

                // Expose for debugging
                window.__RS = { video, plyr, hls, hideLoading };
            });

        })();
    </script>
</body>
</html>
