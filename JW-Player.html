<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Player</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>

<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}
#player{
    width:100%;
    height:100%;
}
#loader{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-family:sans-serif;
    z-index:999;
}
</style>
</head>

<body>

<div id="loader">Loading Stream...</div>
<div id="player"></div>

<script>

const params = new URLSearchParams(window.location.search);

const stream = decodeURIComponent(params.get("url") || "");

if(stream){

    const player = jwplayer("player").setup({
        file: stream,
        type: "hls",
        width: "100%",
        height: "100%",
        autostart: true,
        stretching: "exactfit"
    });

    player.on("play", function () {
        document.getElementById("loader").style.display = "none";
    });

    player.on("error", function () {
        document.getElementById("loader").innerHTML = "Stream Offline";
    });

}else{

    document.getElementById("loader").innerHTML = "No Stream URL";

}

</script>

</body>
</html>
