<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Live Streaming</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; z-index: 1; }

        /* --- কন্ট্রোলার কাস্টমাইজেশন --- */
        .jw-skin-glow .jw-display-icon-container { display: none !important; } /* ডিফল্ট আইকন হাইড */
        .jw-skin-glow .jw-controlbar { background: transparent !important; backdrop-filter: none !important; }
        .jw-video.jw-reset { object-fit: fill !important; }

        /* --- লোডার ডিজাইন --- */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:99; flex-direction: column; transition: opacity 0.4s ease;
        }
        .loader-container { position: relative; width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; }
        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 24px; color: #00c3ff; text-shadow: 0 0 10px #00c3ff; } 
        .brand-name { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }
        .brand-name span { color: #00c3ff; }
        .neon-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; animation: rotate-vortex 1.5s linear infinite; }
        .neon-ring:nth-child(1) { border-top: 2px solid #00c3ff; border-right: 2px solid #00c3ff; box-shadow: 0 0 10px #00c3ff; }
        .neon-ring:nth-child(2) { border-bottom: 2px solid #ff007f; border-left: 2px solid #ff007f; animation-direction: reverse; animation-duration: 2s; box-shadow: 0 0 10px #ff007f; }
        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }
        .loading-text { color: rgba(255, 255, 255, 0.6); font-size: 10px; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; }
        .hide-now { opacity: 0 !important; visibility: hidden !important; }

        /* ================= হুবহু ছবির মতো টপ বার ডিজাইন ================= */
        .player-top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            z-index: 10; display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; pointer-events: auto;
        }
        .top-left { display: flex; align-items: center; gap: 12px; color: #fff; }
        .back-btn { font-size: 18px; cursor: pointer; color: #fff; }
        .channel-logo { width: 32px; height: 32px; background: #fff; border-radius: 6px; padding: 2px; object-fit: contain; }
        .channel-title { font-size: 16px; font-weight: bold; color: #fff; letter-spacing: 0.5px; }

        .top-right { display: flex; align-items: center; gap: 15px; color: #fff; }
        .server-container { display: flex; gap: 6px; }
        .server-btn { padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; background: rgba(255,255,255,0.1); color: #fff; }
        .server-btn.active { background: #e91e63; color: #fff; } /* ছবির মতো চেরি/গোলাপি অ্যাক্টিভ বাটন */
        
        .nav-btn { font-size: 14px; cursor: pointer; color: #fff; background: none; border: none; padding: 5px; }
        .action-icon { font-size: 16px; cursor: pointer; color: #fff; }

        /* ================= ছবির মতো নিচের গ্রিড রিমোট আইকন ================= */
        #remote-grid-toggle {
            position: absolute; bottom: 20px; right: 25px;
            width: 46px; height: 46px; background: #e91e63; /* হুবহু ছবির মতো গোলাপি কালার */
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 16px; cursor: pointer; z-index: 10;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4); transition: transform 0.2s;
        }
        #remote-grid-toggle:active { transform: scale(0.9); }

        /* ================= প্রিমিয়াম ম্যাট ব্ল্যাক রিমোট বডি ================= */
        #tv-remote-panel {
            position: absolute; bottom: 80px; right: 25px;
            width: 210px; background: #131316; border: 2px solid #222226; border-radius: 24px;
            padding: 16px; z-index: 20; display: none; flex-direction: column; gap: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.85);
        }
        #tv-remote-panel.open { display: flex !important; }
        .remote-brand { text-align: center; font-size: 9px; color: #4e515a; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .remote-row { display: flex; justify-content: space-between; gap: 10px; }
        .pwr-btn { width: 48px; height: 35px; background: rgba(255, 40, 40, 0.08); color: #ff3b3b; border-radius: 10px; border: 1px solid rgba(255,39,39,0.15); font-size: 13px; cursor: pointer; }
        .cls-btn { width: 48px; height: 35px; background: #1c1c21; color: #666; border-radius: 10px; border: 1px solid #25252b; font-size: 12px; cursor: pointer; }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .r-btn { height: 38px; background: #1c1c21; color: #e1e1e6; border: 1px solid #25252b; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .r-btn:active { background: #00c3ff; color: #000; }
        .ch-container { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; }
        .ch-btn { width: 100%; height: 35px; background: #1c1c21; color: #8a8d99; border: 1px solid #25252b; border-radius: 10px; font-size: 9px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ok-btn { width: 48px; height: 48px; background: #141417; color: #fff; border: 2px solid #25252b; border-radius: 50%; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* এরর মেসেজ */
        .error-content { text-align: center; color: #fff; z-index: 100; }
        .error-content i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <!-- টপ বার কন্ট্রোলার (হুবহু ছবির মতো ডিজাইন) -->
    <div class="player-top-bar">
        <div class="top-left">
            <i class="fas fa-chevron-left back-btn" onclick="history.back()"></i>
            <span style="font-size: 14px; font-weight: bold; color: #aaa;">4.</span>
            <!-- এখানে আপনার লোগোর ইমেজ লিঙ্ক বসাতে পারেন -->
            <img class="channel-logo" src="https://upload.wikimedia.org/wikipedia/commons/2/22/Bangladesh_Television_logo.svg" alt="Logo">
            <div class="channel-title">BTV CTG</div>
        </div>
        
        <div class="top-right">
            <div class="server-container">
                <button class="server-btn" onclick="switchServer(1)">Server 1</button>
                <button class="server-btn active" onclick="switchServer(2)">Server 2</button>
            </div>
            <!-- নেক্সট এবং প্রিভিয়াস বাটন -->
            <button class="nav-btn" onclick="prevChannel()"><i class="fas fa-caret-left"></i></button>
            <button class="nav-btn" onclick="nextChannel()"><i class="fas fa-caret-right"></i></button>
            <!-- রিলোড, ফুলস্ক্রিন ও সেটিংস আইকন -->
            <i class="fas fa-sync-alt action-icon" onclick="location.reload()"></i>
            <i class="fas fa-expand action-icon" onclick="toggleFullscreen()"></i>
            <i class="fas fa-cog action-icon"></i>
        </div>
    </div>

    <!-- লোডার স্ক্রিন -->
    <div id="loader">
        <div class="loader-container">
            <div class="neon-ring"></div>
            <div class="neon-ring"></div>
            <div class="loader-brand">
                <i class="fas fa-tv tv-icon"></i>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        </div>
        <div class="loading-text">BUFFERING...</div>
    </div>

    <!-- গোলাপি গ্রিড আইকন বাটন (রিমোট কন্ট্রোলার ওপেন করার জন্য) -->
    <div id="remote-grid-toggle" onclick="toggleRemote()">
        <i class="fas fa-th"></i>
    </div>

    <!-- রিমোট কন্ট্রোল প্যানেল -->
    <div id="tv-remote-panel">
        <div class="remote-brand">RS SMART TV</div>
        <div class="remote-row">
            <button class="pwr-btn" onclick="location.reload()"><i class="fas fa-power-off"></i></button>
            <button class="cls-btn" onclick="toggleRemote()"><i class="fas fa-times"></i></button>
        </div>
        <div class="num-grid">
            <button class="r-btn" onclick="pressNum(1)">1</button><button class="r-btn" onclick="pressNum(2)">2</button><button class="r-btn" onclick="pressNum(3)">3</button>
            <button class="r-btn" onclick="pressNum(4)">4</button><button class="r-btn" onclick="pressNum(5)">5</button><button class="r-btn" onclick="pressNum(6)">6</button>
            <button class="r-btn" onclick="pressNum(7)">7</button><button class="r-btn" onclick="pressNum(8)">8</button><button class="r-btn" onclick="pressNum(9)">9</button>
            <div></div><button class="r-btn" onclick="pressNum(0)">0</button><div></div>
        </div>
        <div class="ch-container">
            <button class="ch-btn" onclick="changeChannel('up')"><i class="fas fa-chevron-up"></i>CH+</button>
            <button class="ok-btn">OK</button>
            <button class="ch-btn" onclick="changeChannel('down')">CH-<i class="fas fa-chevron-down"></i></button>
        </div>
    </div>

    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%", height: "100%",
            autostart: true, stretching: "exactfit",
            skin: { name: "glow" }, displaytitle: false
        });

        player.on("ready", () => { player.setMute(false); player.setVolume(100); });
        player.on("play", () => document.getElementById("loader").classList.add("hide-now"));
        player.on("buffer", () => document.getElementById("loader").classList.remove("hide-now"));
        player.on("error", () => {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now"); 
            loader.innerHTML = `
                <div class="error-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Stream Offline!</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>`;
        });
    } else {
        document.getElementById("loader").innerHTML = '<div class="brand-name">No Stream URL Found</div>';
    }

    // ================= অ্যাকশন ফাংশনসমূহ =================
    function toggleRemote() {
        document.getElementById("tv-remote-panel").classList.toggle("open");
    }
    function switchServer(id) {
        console.log("Switched to Server " + id);
    }
    function nextChannel() {
        console.log("Next Channel Triggered");
    }
    function prevChannel() {
        console.log("Previous Channel Triggered");
    }
    function toggleFullscreen() {
        const el = document.getElementById("player-wrapper");
        if (!document.fullscreenElement) {
            el.requestFullscreen().catch(err => alert(err.message));
        } else {
            document.exitFullscreen();
        }
    }
    function pressNum(num) { console.log("Pressed: " + num); }
    function changeChannel(dir) { console.log("CH: " + dir); }
</script>

</body>
</html>
