<body>

    <!-- ===== LOADING OVERLAY (RS Live TV) ===== -->
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">Loading stream...</div>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- ===== VIDEO ===== -->
    <video id="player" playsinline muted autoplay></video>

    <!-- ===== PLYR + HLS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            // get video src from URL param
            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url');

            let plyr = null;
            let hls = null;

            // ----- hide loading -----
            function hideLoading() {
                overlay.classList.add('hidden');
            }

            // fallback: force hide after 6s (if HLS stuck)
            const fallbackTimer = setTimeout(hideLoading, 6000);

            // ----- ROTATION: DISABLED in fullscreen (always 0) -----
            // We force transform: none in fullscreen via CSS.
            // For normal mode, we keep video straight (no rotation).
            function applyNoRotation() {
                video.style.transform = 'none';
                video.style.objectFit = 'cover';
            }

            // ----- PLYR INIT -----
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                });

                plyr.on('ready', applyNoRotation);
                plyr.on('fullscreenchange', function() {
                    // small delay to let fullscreen settle
                    setTimeout(applyNoRotation, 150);
                });

                // native fullscreen events (extra safety)
                document.addEventListener('fullscreenchange', function() {
                    setTimeout(applyNoRotation, 150);
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    setTimeout(applyNoRotation, 150);
                });
            }

            // ----- HLS SETUP -----
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                        video.play().catch(function() {});
                    });

                    hls.on(Hls.Events.ERROR, function() {
                        // if error, still try to show video
                        clearTimeout(fallbackTimer);
                        hideLoading();
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // native HLS (Safari)
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                        video.play().catch(function() {});
                    });
                } else {
                    // not supported
                    hideLoading();
                }
            }

            // ----- INIT -----
            document.addEventListener('DOMContentLoaded', function() {
                setupHls();
                initPlyr();

                // apply straight video (no rotation)
                applyNoRotation();

                // additional safety: after any resize/orientation, keep straight
                window.addEventListener('resize', applyNoRotation);
                window.addEventListener('orientationchange', function() {
                    setTimeout(applyNoRotation, 200);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(applyNoRotation, 200);
                    });
                }

                // if video loads late
                video.addEventListener('canplay', function() {
                    clearTimeout(fallbackTimer);
                    hideLoading();
                });

                // expose for debug
                window.__rsPlayer = { video, plyr, hls, hideLoading };
            });

        })();
    </script>
</body>
