<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Compact Loader</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* --- কন্ট্রোলার কাস্টমাইজেশন --- */
        .jw-skin-glow .jw-display-icon-container { 
            background: rgba(255, 255, 255, 0.1) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: none !important; 
        }
        .jw-skin-glow .jw-button-color { color: #ffffff !important; }
        .jw-skin-glow .jw-controlbar { 
            background: transparent !important; 
            backdrop-filter: none !important; 
        }

        /* --- লোডার ডিজাইন --- */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:99; flex-direction: column; transition: opacity 0.4s ease;
        }

        .loader-container {
            position: relative; 
            width: 100px; 
            height: 100px; 
            display: flex; justify-content: center; align-items: center;
        }

        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 24px; color: #00c3ff; text-shadow: 0 0 10px #00c3ff; } 
        .brand-name { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }
        .brand-name span { color: #00c3ff; }

        .neon-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid transparent;
            animation: rotate-vortex 1.5s linear infinite;
        }
        .neon-ring:nth-child(1) { border-top: 2px solid #00c3ff; border-right: 2px solid #00c3ff; box-shadow: 0 0 10px #00c3ff; }
        .neon-ring:nth-child(2) { border-bottom: 2px solid #ff007f; border-left: 2px solid #ff007f; animation-direction: reverse; animation-duration: 2s; box-shadow: 0 0 10px #ff007f; }

        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }

        .loading-text { color: rgba(255, 255, 255, 0.6); font-size: 10px; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- ভিডিও সাইড কাটা ফিক্স --- */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
        }
        
        .hide-now { opacity: 0 !important; visibility: hidden !important; }

        /* এরর মেসেজ */
        .error-content { text-align: center; color: #fff; z-index: 100; }
        .error-content i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; }

        /* ট্যাপ টু আনমিউট বাটন */
        #unmute-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 195, 255, 0.8); color: white;
            padding: 8px 15px; border-radius: 20px; font-size: 12px;
            font-weight: bold; z-index: 98; display: none; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 195, 255, 0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="unmute-btn" onclick="unmutePlayer()"><i class="fas fa-volume-up"></i> TAP TO UNMUTE</div>
    <div id="loader">
        <div class="loader-container">
            <div class="neon-ring"></div>
            <div class="neon-ring"></div>
            <div class="loader-brand">
                <i class="fas fa-tv tv-icon"></i>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        </div>
        <div class="loading-text">BUFFERING...</div>
    </div>
    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');
    let playerInstance;

    if (streamSource) {
        playerInstance = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false, // ডিফল্ট মিউট ফলস রাখা হলো
            stretching: "exactfit",
            skin: { name: "glow" },
            displaytitle: false
        });

        playerInstance.on("ready", () => {
            // প্লেয়ার রেডি হলে জোরপূর্বক আনমিউট ও ভলিউম সেট করা
            playerInstance.setMute(false);
            playerInstance.setVolume(100);
        });

        playerInstance.on("play", () => {
            document.getElementById("loader").classList.add("hide-now");
            
            // প্লে হওয়ার পর যদি ব্রাউজার জোর করে মিউট করে দেয়, তবে স্ক্রিনে একটি সুন্দর আনমিউট বাটন দেখাবে
            setTimeout(() => {
                if (playerInstance.getMute()) {
                    document.getElementById("unmute-btn").style.display = "block";
                }
            }, 500);
        });

        playerInstance.on("buffer", () => {
            document.getElementById("loader").classList.remove("hide-now");
        });

        playerInstance.on("error", () => {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now"); 
            loader.innerHTML = `
                <div class="error-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Stream Offline!</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            `;
        });

    } else {
        document.getElementById("loader").innerHTML = '<div class="brand-name">No Stream URL Found</div>';
    }

    // বাটন বা স্ক্রিনের যেকোনো জায়গায় ক্লিক করলে ফুল আনমিউট করার ফাংশন
    function unmutePlayer() {
        if (playerInstance) {
            playerInstance.setMute(false);
            playerInstance.setVolume(100);
            document.getElementById("unmute-btn").style.display = "none";
        }
    }

    // ইউজার প্লেয়ারের বডিতে প্রথম টাচ করলেই যেন সাউন্ড অ্যাক্টিভ হয়ে যায়
    document.body.addEventListener('click', () => {
        if (playerInstance && playerInstance.getMute()) {
            unmutePlayer();
        }
    }, { once: true });
</script>

</body>
</html>
