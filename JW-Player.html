<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Code Based UI</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#0a0a12; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* --- কোড-ভিত্তিক লোগো লোডার --- */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            display:flex; justify-content:center; align-items:center; flex-direction: column;
            z-index:99; transition: opacity 0.5s ease;
        }

        /* লোগো কন্টেইনার */
        .logo-box {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            gap: 15px;
        }

        /* RS টেক্সট লোগো */
        .rs-logo {
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 195, 255, 0.5);
        }
        .rs-logo span { color: #00c3ff; }

        /* LIVE টিভি আইকন ও টেক্সট */
        .live-tag {
            background: #ff007f;
            color: #fff;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 0 10px #ff007f;
        }

        /* লোডিং স্পিনার */
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00c3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide-now { opacity: 0 !important; visibility: hidden !important; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="loader">
        <div class="logo-box">
            <div class="rs-logo">R<span>S</span></div>
            <div class="live-tag">LIVE TV</div>
        </div>
        <div class="spinner"></div>
    </div>
    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "exactfit",
            skin: { name: "glow" },
            displaytitle: false
        });

        player.on("play", () => { document.getElementById("loader").classList.add("hide-now"); });
        player.on("buffer", () => { document.getElementById("loader").classList.remove("hide-now"); });
    } else {
        document.getElementById("loader").innerHTML = '<div style="color:#fff">No Stream URL Found</div>';
    }
</script>

</body>
</html>
