<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV · Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player {
            width: 100% !important;
            height: 100% !important;
            display: block;
            object-fit: cover;
            transform: none !important;
            rotate: 0deg !important;
        }
        .plyr--video { width: 100vw !important; height: 100vh !important; background: #000; }
        :-webkit-full-screen #player,
        :fullscreen #player,
        #player:fullscreen { transform: none !important; rotate: 0deg !important; }

        /* Loading */
        #loading {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #12121c, #06060c);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .brand { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #fff 10%, #00f0ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand span { background: linear-gradient(90deg, #ff296d, #ffd000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { font-size: 8px; color: #5a6f89; letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; opacity: 0.5; }
        .spin { margin-top: 14px; width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.05); border-top-color: #00f0ff; border-right-color: #ff296d; border-radius: 50%; animation: spin 0.7s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="brand">RS <span>LIVE TV</span></div>
        <div class="sub">loading stream</div>
        <div class="spin"></div>
    </div>

    <video id="player" playsinline muted autoplay></video>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const loading = document.getElementById('loading');

            // URL থেকে চ্যানেল সোর্স নেওয়া (ডিফল্ট টেস্ট স্ট্রিম)
            const src = new URLSearchParams(location.search).get('url') || 
                       'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isPlaying = false;

            // ===== LOADING HIDE =====
            function hideLoading() {
                loading.classList.add('hidden');
            }

            // ===== FORCE NO ROTATION =====
            function lockRotation() {
                video.style.transform = 'none';
                video.style.rotate = '0deg';
            }

            // ===== AUTOPLAY: MULTIPLE ATTEMPTS =====
            function attemptAutoplay() {
                if (isPlaying) return;
                video.play()
                    .then(() => {
                        isPlaying = true;
                        console.log('✅ Autoplay successful');
                    })
                    .catch((err) => {
                        console.warn('⚠️ Autoplay blocked, retrying...', err.message);
                        // Retry after user interaction (click/tap)
                        const retry = () => {
                            video.play().then(() => {
                                isPlaying = true;
                                console.log('✅ Autoplay after interaction');
                            }).catch(() => {});
                            document.removeEventListener('click', retry);
                            document.removeEventListener('touchstart', retry);
                        };
                        document.addEventListener('click', retry);
                        document.addEventListener('touchstart', retry);
                    });
            }

            // ===== PLYR INIT =====
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,  // Plyr autoplay — কিন্তু HLS এর সাথে sync নাও হতে পারে
                    muted: true,
                });

                plyr.on('ready', () => {
                    lockRotation();
                    // Plyr ready হলে autoplay চেষ্টা
                    attemptAutoplay();
                });

                plyr.on('fullscreenchange', () => setTimeout(lockRotation, 100));
                document.addEventListener('fullscreenchange', () => setTimeout(lockRotation, 100));
                window.addEventListener('resize', lockRotation);
                window.addEventListener('orientationchange', () => setTimeout(lockRotation, 150));
            }

            // ===== HLS SETUP =====
            function setupHls() {
                if (!src) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });

                    hls.loadSource(src);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        hideLoading();
                        // Manifest parsed হলে autoplay ট্রিগার
                        attemptAutoplay();
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            hideLoading();
                            // Error থাকলেও autoplay চেষ্টা
                            attemptAutoplay();
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari native HLS
                    video.src = src;
                    video.addEventListener('loadedmetadata', () => {
                        hideLoading();
                        attemptAutoplay();
                    });
                } else {
                    hideLoading();
                    attemptAutoplay();
                }

                // fallback: 5 sec পরে loading hide
                setTimeout(() => {
                    hideLoading();
                    attemptAutoplay();
                }, 5000);
            }

            // ===== VIDEO EVENTS (additional safety) =====
            video.addEventListener('canplay', () => {
                hideLoading();
                attemptAutoplay();
            });

            video.addEventListener('loadeddata', () => {
                hideLoading();
                attemptAutoplay();
            });

            // ===== START =====
            document.addEventListener('DOMContentLoaded', () => {
                setupHls();
                initPlyr();
                lockRotation();
            });

            // ===== EXPOSE DEBUG =====
            window.__RS = { video, plyr, hls, attemptAutoplay, lockRotation };

        })();
    </script>
</body>
</html>
