<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: cover;
            transform: none !important;
            rotate: 0deg !important;
            transition: rotate 0.3s ease, transform 0.3s ease;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        .plyr__controls {
            z-index: 20;
        }

        /* Loading Overlay - Improved */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #12121c 0%, #06060c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 10%, #8ad7ff 55%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.08);
            line-height: 1.2;
        }
        
        .loader-brand span {
            background: linear-gradient(90deg, #ff296d 0%, #ff5e00 45%, #ffd000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-sub {
            font-size: 8px;
            color: #5a6f89;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 2px;
            opacity: 0.5;
        }

        .loader-spinner {
            margin-top: 14px;
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #00f0ff;
            border-right-color: #ff296d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            position: relative;
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(0, 240, 255, 0.2);
            animation: spin 1.4s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Force no rotation in fullscreen */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            transform: none !important;
            rotate: 0deg !important;
        }

        :-webkit-full-screen .plyr--video,
        :-moz-full-screen .plyr--video,
        :fullscreen .plyr--video {
            transform: none !important;
            rotate: 0deg !important;
        }

        video:fullscreen,
        video:-webkit-full-screen,
        video:-moz-full-screen {
            transform: none !important;
            rotate: 0deg !important;
        }

        @media (max-width: 400px) {
            .loader-brand {
                font-size: 18px;
            }
            .loader-sub {
                font-size: 7px;
                letter-spacing: 2px;
            }
            .loader-spinner {
                width: 22px;
                height: 22px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-spinner"></div>
    </div>

    <!-- Video Element -->
    <video id="player" playsinline muted autoplay></video>

    <!-- Plyr + HLS -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            // Get video URL from query parameter
            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;
            let isRotated = false;

            // Hide Loading with proper cleanup
            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                
                overlay.classList.add('hidden');
            }

            // Toggle rotation
            function toggleRotation() {
                isRotated = !isRotated;
                if (isRotated) {
                    video.style.transform = 'rotate(90deg)';
                    video.style.rotate = '90deg';
                } else {
                    video.style.transform = 'none';
                    video.style.rotate = '0deg';
                }
            }

            // Force no rotation
            function lockRotation() {
                // Direct CSS manipulation for maximum control
                video.style.cssText += 'transform: none !important; rotate: 0deg !important;';
                
                // Also handle any inline styles
                video.style.transform = 'none';
                video.style.rotate = '0deg';
                video.style.webkitTransform = 'none';
                
                // Ensure object-fit remains
                video.style.objectFit = 'cover';
                
                // Reset rotation state
                isRotated = false;
            }

            // Initialize Plyr
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    duration: null,
                    displayDuration: true,
                    invertTime: false,
                    toggleInvert: false,
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    lockRotation();
                    // Force hide loading if not already hidden
                    setTimeout(hideLoading, 100);
                });

                // Fullscreen events
                plyr.on('fullscreenchange', function() {
                    // Toggle rotation when entering/exiting fullscreen
                    toggleRotation();
                });

                // Native fullscreen events
                document.addEventListener('fullscreenchange', function() {
                    // Toggle rotation when entering/exiting fullscreen
                    toggleRotation();
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    toggleRotation();
                });

                // Orientation / resize
                window.addEventListener('resize', function() {
                    setTimeout(lockRotation, 50);
                });
                window.addEventListener('orientationchange', function() {
                    setTimeout(lockRotation, 100);
                });

                // Screen orientation API
                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(lockRotation, 100);
                    });
                }

                // MutationObserver for style changes
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                            const transform = video.style.transform;
                            const rotate = video.style.rotate;
                            if ((transform && transform !== 'none') || (rotate && rotate !== '0deg')) {
                                lockRotation();
                            }
                        }
                    });
                });
                observer.observe(video, { attributes: true, attributeFilter: ['style'] });

                // Periodic check for rotation (backup)
                setInterval(function() {
                    const transform = video.style.transform;
                    const rotate = video.style.rotate;
                    if ((transform && transform !== 'none') || (rotate && rotate !== '0deg')) {
                        lockRotation();
                    }
                }, 500);
            }

            // Setup HLS
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backbufferLength: 30,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 600,
                        liveSyncDurationCount: 3,
                        liveMaxLatencyDurationCount: 10,
                        enableWebVTT: false,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.warn('HLS fatal error, attempting recovery:', data);
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hls.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hideLoading();
                                    break;
                            }
                        } else {
                            // Non-fatal error, just log
                            console.warn('HLS non-fatal error:', data);
                        }
                    });

                    hls.on(Hls.Events.FRAG_LOADED, function() {
                        // Hide loading as soon as we get any fragment
                        hideLoading();
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Native HLS (Safari)
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });
                } else {
                    hideLoading();
                }
            }

            // Start
            document.addEventListener('DOMContentLoaded', function() {
                // Set loading timeout - hide after 4 seconds max
                loadingTimeout = setTimeout(hideLoading, 4000);

                setupHls();
                initPlyr();
                lockRotation();

                // Additional events to hide loading
                video.addEventListener('canplay', function() {
                    hideLoading();
                });
                video.addEventListener('loadeddata', function() {
                    hideLoading();
                });
                video.addEventListener('playing', function() {
                    hideLoading();
                });

                // Prevent any click/touch from causing rotation
                video.addEventListener('click', function(e) {
                    e.preventDefault();
                    lockRotation();
                });

                video.addEventListener('touchstart', function(e) {
                    lockRotation();
                });

                // Expose for debugging
                window.__RS = { video, plyr, hls, lockRotation, hideLoading, toggleRotation };
            });

        })();
    </script>
</body>
</html>
