<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>
    
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #player-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Full wrapper rotates - includes video + controls */
        #player-wrapper.rotated {
            transform: rotate(90deg) scale(1.78);
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        .plyr__controls {
            z-index: 20;
            position: absolute !important;
            bottom: 0 !important;
            width: 100% !important;
        }

        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: contain;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #12121c 0%, #06060c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 10%, #8ad7ff 55%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.08);
            line-height: 1.2;
        }
        
        .loader-brand span {
            background: linear-gradient(90deg, #ff296d 0%, #ff5e00 45%, #ffd000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-sub {
            font-size: 8px;
            color: #5a6f89;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 2px;
            opacity: 0.5;
        }

        .loader-spinner {
            margin-top: 14px;
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #00f0ff;
            border-right-color: #ff296d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            position: relative;
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: rgba(0, 240, 255, 0.2);
            animation: spin 1.4s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message for blocked videos */
        #error-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            display: none;
            text-align: center;
            max-width: 90%;
        }

        @media (max-width: 400px) {
            .loader-brand { font-size: 18px; }
            .loader-sub { font-size: 7px; letter-spacing: 2px; }
            .loader-spinner { width: 22px; height: 22px; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-spinner"></div>
    </div>

    <div id="error-msg"></div>

    <div id="player-wrapper">
        <video id="player" playsinline muted autoplay></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const wrapper = document.getElementById('player-wrapper');
            const overlay = document.getElementById('loading-overlay');
            const errorMsg = document.getElementById('error-msg');

            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;
            let loadingTimeout = null;
            let isRotated = false;
            let retryCount = 0;

            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                overlay.classList.add('hidden');
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 8000);
            }

            // Toggle rotation - rotates entire wrapper
            function toggleRotation() {
                isRotated = !isRotated;
                if (isRotated) {
                    wrapper.classList.add('rotated');
                } else {
                    wrapper.classList.remove('rotated');
                }
            }

            function resetRotation() {
                isRotated = false;
                wrapper.classList.remove('rotated');
            }

            // Try alternative video source if blocked
            function tryAlternativeSource() {
                if (retryCount >= 2) {
                    showError('ভিডিও ব্লক করা হয়েছে। শুধু অডিও পাওয়া যাচ্ছে।');
                    return;
                }
                retryCount++;
                
                // Try with different user agent or CORS settings
                if (hls) {
                    hls.destroy();
                }
                
                // Reload with different config
                setTimeout(() => {
                    setupHls(true);
                }, 1000);
            }

            function setupHls(forceReload = false) {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    try {
                        hls = new Hls({
                            enableWorker: true,
                            lowLatencyMode: true,
                            backbufferLength: 30,
                            maxBufferLength: 30,
                            maxMaxBufferLength: 600,
                            liveSyncDurationCount: 3,
                            liveMaxLatencyDurationCount: 10,
                            enableWebVTT: false,
                            xhrSetup: function(xhr, url) {
                                // Try to bypass some blocks
                                xhr.withCredentials = false;
                                // Add custom headers if needed
                                xhr.setRequestHeader('Origin', window.location.origin);
                            }
                        });

                        hls.loadSource(videoSrc);
                        hls.attachMedia(video);

                        hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            hideLoading();
                            video.play().catch(function(e) {
                                console.warn('Autoplay prevented:', e);
                            });
                        });

                        hls.on(Hls.Events.ERROR, function(event, data) {
                            if (data.fatal) {
                                console.warn('HLS fatal error:', data);
                                switch (data.type) {
                                    case Hls.ErrorTypes.NETWORK_ERROR:
                                        // Try to recover
                                        if (data.response && data.response.code === 403) {
                                            showError('ভিডিও ব্লক করা হয়েছে (403)');
                                            tryAlternativeSource();
                                        } else {
                                            hls.startLoad();
                                        }
                                        break;
                                    case Hls.ErrorTypes.MEDIA_ERROR:
                                        hls.recoverMediaError();
                                        break;
                                    default:
                                        hideLoading();
                                        if (data.response && data.response.code === 403) {
                                            showError('ভিডিও অ্যাক্সেস ব্লক করা হয়েছে');
                                        }
                                        break;
                                }
                            } else {
                                console.warn('HLS non-fatal error:', data);
                            }
                        });

                        hls.on(Hls.Events.FRAG_LOADED, function() {
                            hideLoading();
                        });

                        hls.on(Hls.Events.FRAG_PARSING_METADATA, function() {
                            hideLoading();
                        });

                    } catch (e) {
                        console.error('HLS setup error:', e);
                        hideLoading();
                        showError('ভিডিও লোড করতে সমস্যা হয়েছে');
                    }

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        hideLoading();
                        video.play().catch(function(e) {
                            console.warn('Autoplay prevented:', e);
                        });
                    });
                    video.addEventListener('error', function(e) {
                        if (video.error) {
                            if (video.error.code === 4) {
                                showError('ভিডিও লোড হয়নি। ব্লক করা থাকতে পারে।');
                            }
                        }
                    });
                } else {
                    hideLoading();
                    showError('এই ব্রাউজার HLS সাপোর্ট করে না');
                }
            }

            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                    keyboard: { focused: true, global: true },
                    tooltips: { controls: false, seek: true },
                    disableContextMenu: true,
                    loadSprite: true,
                    iconPrefix: 'plyr',
                    blankVideo: 'https://cdn.plyr.io/static/blank.mp4',
                    seekTime: 10,
                });

                plyr.on('ready', function() {
                    resetRotation();
                    setTimeout(hideLoading, 100);
                });

                plyr.on('fullscreenchange', function() {
                    if (plyr.fullscreen.active) {
                        toggleRotation();
                    } else {
                        resetRotation();
                    }
                });

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && isRotated) {
                        resetRotation();
                    }
                });

                window.addEventListener('resize', function() {
                    if (!plyr.fullscreen.active && isRotated) {
                        resetRotation();
                    }
                });

                window.addEventListener('orientationchange', function() {
                    setTimeout(function() {
                        if (plyr.fullscreen.active && !isRotated) {
                            toggleRotation();
                        }
                    }, 300);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(function() {
                            if (plyr.fullscreen.active && !isRotated) {
                                toggleRotation();
                            }
                        }, 300);
                    });
                }
            }

            // Handle video issues - try to show video even if only audio
            function handleVideoIssues() {
                video.addEventListener('loadedmetadata', function() {
                    if (video.videoWidth === 0 || video.videoHeight === 0) {
                        console.warn('Video has no dimensions - trying to force render');
                        // This might be an audio-only stream
                        // Try to still show something
                        setTimeout(() => {
                            hideLoading();
                        }, 1000);
                    }
                });

                video.addEventListener('stalled', function() {
                    console.warn('Video stalled, attempting recovery');
                    if (hls) {
                        hls.startLoad();
                    }
                });

                video.addEventListener('waiting', function() {
                    console.warn('Video waiting for data');
                });

                // If video can't load, try alternative after timeout
                setTimeout(() => {
                    if (!isHidden && video.readyState < 2) {
                        console.warn('Video still not ready after timeout');
                        tryAlternativeSource();
                    }
                }, 8000);
            }

            // Start
            document.addEventListener('DOMContentLoaded', function() {
                loadingTimeout = setTimeout(hideLoading, 5000);

                setupHls();
                handleVideoIssues();
                initPlyr();

                video.addEventListener('canplay', hideLoading);
                video.addEventListener('loadeddata', hideLoading);
                video.addEventListener('playing', hideLoading);

                // Force video to show
                setTimeout(function() {
                    if (!isHidden) {
                        video.style.display = 'block';
                        video.style.opacity = '1';
                        if (video.currentTime >= 0) {
                            video.currentTime = video.currentTime;
                        }
                    }
                }, 3000);

                window.__RS = { 
                    video, 
                    plyr, 
                    hls, 
                    toggleRotation, 
                    resetRotation,
                    isRotated: () => isRotated,
                    tryAlternativeSource
                };
            });

        })();
    </script>
</body>
</html>
