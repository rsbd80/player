<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>RS Player Pro</title>
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family: sans-serif; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; }
        #player { width:100% !important; height:100% !important; }

        /* লোডার ডিজাইন */
        #loader { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:99; transition:0.5s; }
        .ring { width:80px; height:80px; border:3px solid transparent; border-top:3px solid #00c3ff; border-radius:50%; animation: rot 1s linear infinite; }
        @keyframes rot { 100% { transform:rotate(360deg); } }
        .fade-out { opacity:0; pointer-events:none; }

        /* রিমোট আইকন (মোবাইলে ফুলস্ক্রিনে শো করবে, পিসিতে অলওয়েজ) */
        #remote-btn { 
            position: absolute; bottom: 20px; right: 20px; z-index: 100;
            width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 1px solid #444;
            border-radius: 50%; color: #00c3ff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            display: none; /* ডিফল্ট হাইড */
        }
        
        /* পিসির জন্য অলওয়েজ শো */
        @media (min-width: 1024px) { #remote-btn { display: flex !important; } }
        /* ফুলস্ক্রিন ক্লাস */
        .show-remote { display: flex !important; }

        /* রিমোট প্যানেল */
        #remote-panel {
            position: absolute; bottom: 80px; right: 20px; width: 200px; background: #111;
            padding: 15px; border-radius: 15px; display: none; z-index: 101; border: 1px solid #333;
        }
        #remote-panel.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { padding: 10px; background: #222; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="loader"><div class="ring"></div></div>

    <!-- রিমোট আইকন -->
    <div id="remote-btn" onclick="toggleRemote()"><i class="fas fa-tv"></i></div>

    <!-- রিমোট প্যানেল -->
    <div id="remote-panel">
        <div class="grid">
            <button onclick="changeCh(1)">1</button><button onclick="changeCh(2)">2</button><button onclick="changeCh(3)">3</button>
            <button onclick="changeCh(4)">4</button><button onclick="changeCh(5)">5</button><button onclick="changeCh(6)">6</button>
        </div>
    </div>

    <div id="player"></div>
</div>

<script>
    const player = jwplayer("player").setup({
        playlist: [{ file: "YOUR_URL_HERE", type: "hls" }],
        width: "100%", height: "100%", stretching: "exactfit", autostart: true
    });

    player.on("play", () => document.getElementById("loader").classList.add("fade-out"));

    // রিমোট প্যানেল টগল
    function toggleRemote() { document.getElementById("remote-panel").classList.toggle("active"); }

    // চ্যানেল চেঞ্জ
    function changeCh(n) {
        player.load([{ file: "YOUR_URL_HERE_" + n, type: "hls" }]);
        player.play();
    }

    // ফুলস্ক্রিন ডিটেকশন
    document.addEventListener("fullscreenchange", () => {
        const btn = document.getElementById("remote-btn");
        if (document.fullscreenElement) btn.classList.add("show-remote");
        else if (window.innerWidth < 1024) btn.classList.remove("show-remote");
    });
</script>

</body>
</html>
