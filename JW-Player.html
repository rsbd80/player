<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Player Pro</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#player{
width:100%;
height:100%;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:70px;
height:70px;
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #00c3ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

.logo{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#fff;
}

.logo span{
color:#00c3ff;
}

.loading{
margin-top:10px;
color:#aaa;
font-size:14px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.watermark{
position:fixed;
top:15px;
right:15px;
z-index:999;
color:#fff;
font-size:14px;
background:rgba(0,0,0,.5);
padding:6px 10px;
border-radius:6px;
}

.error{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#fff;
font-size:20px;
z-index:99999;
}
</style>
</head>
<body>

<div id="loader">
<div class="spinner"></div>
<div class="logo">RS LIVE <span>TV</span></div>
<div class="loading">Loading Stream...</div>
</div>

<div class="watermark">RS LIVE TV</div>

<div id="player"></div>

<script>
const params = new URLSearchParams(window.location.search);
const stream = params.get("url");

if(!stream){
document.body.innerHTML='<div class="error">No Stream URL Found</div>';
throw new Error("No Stream URL");
}

const player = jwplayer("player").setup({
file: decodeURIComponent(stream),
type: "hls",
width: "100%",
height: "100%",
autostart: true,
mute: true,
stretching: "uniform",
displaytitle: false,
displaydescription: false
});

player.on("firstFrame", () => {
document.getElementById("loader").style.display="none";

setTimeout(()=>{
player.setMute(false);
player.setVolume(100);
},1000);
});

player.on("error", () => {
document.body.innerHTML=
'<div class="error">Stream Offline</div>';
});

player.on("setupError", () => {
document.body.innerHTML=
'<div class="error">Player Error</div>';
});
</script>

</body>
</html>
