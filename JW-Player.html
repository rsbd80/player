<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Futuristic Glass Loader</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#05050c; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* --- কন্ট্রোলার কাস্টমাইজেশন --- */
        .jw-skin-glow .jw-display-icon-container { 
            background: rgba(255, 255, 255, 0.1) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: none !important; 
        }
        .jw-skin-glow .jw-button-color { color: #ffffff !important; }
        .jw-skin-glow .jw-controlbar { 
            background: transparent !important; 
            backdrop-filter: none !important; 
        }

        /* --- সম্পূর্ণ নতুন গ্লাস ও অরবিট লোডার ডিজাইন --- */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #030308;
            display:flex; justify-content:center; align-items:center;
            z-index:99; flex-direction: column; transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* মোশন ব্যাকগ্রাউন্ড গ্লো */
        #loader::before {
            content: '';
            position: absolute;
            width: 150px; height: 150px;
            background: linear-gradient(45deg, #00c3ff, #ff007f);
            filter: blur(80px);
            opacity: 0.4;
            animation: pulse-bg 3s ease-in-out infinite alternate;
        }

        .loader-container {
            position: relative; 
            width: 120px; 
            height: 120px; 
            display: flex; justify-content: center; align-items: center;
        }

        /* গ্লাস মরফিজম কোর কোর সার্কেল */
        .glass-core {
            position: relative;
            width: 85px; height: 85px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05), 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        .tv-icon { 
            font-size: 22px; 
            color: #fff; 
            animation: float-icon 2s ease-in-out infinite;
        }
        
        .brand-name { 
            font-size: 9px; 
            font-weight: 800; 
            color: #fff; 
            text-transform: uppercase; 
            margin-top: 5px; 
            letter-spacing: 1px; 
        }
        .brand-name span { color: #ff007f; text-shadow: 0 0 8px rgba(255, 0, 127, 0.6); }

        /* অরবিটিং ট্র্যাক এবং পার্টিকেল */
        .orbit-track {
            position: absolute;
            width: 110px; height: 110px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: spin-orbit 2.5s linear infinite;
        }

        /* অরবিটিং গ্লোয়িং ডট (ইলেকট্রন ইফেক্ট) */
        .orbit-track::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px;
            width: 10px; height: 10px;
            background: #00c3ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #00c3ff, 0 0 20px #00c3ff;
        }

        /* অ্যানিমেশন কীফ্রেমসমূহ */
        @keyframes spin-orbit { 100% { transform: rotate(360deg); } }
        @keyframes pulse-bg { 0% { transform: scale(0.8); opacity: 0.3; } 100% { transform: scale(1.2); opacity: 0.5; } }
        @keyframes float-icon { 0%, 100% { transform: translateY(0); color: #00c3ff; } 50% { transform: translateY(-4px); color: #ff007f; } }
        @keyframes text-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* মডার্ন প্রগ্রেস ডট টেক্সট */
        .loading-text { 
            color: rgba(255, 255, 255, 0.7); 
            font-size: 10px; 
            margin-top: 25px; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-weight: 500;
            animation: text-glow 1.8s ease-in-out infinite;
        }

        /* --- ভিডিও সাইড কাটা ফিক্স --- */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
        }
        
        .hide-now { opacity: 0 !important; visibility: hidden !important; }

        /* এরর মেসেজ */
        .error-content { text-align: center; color: #fff; z-index: 100; }
        .error-content i { font-size: 35px; color: #ff4d4d; margin-bottom: 15px; filter: drop-shadow(0 0 8px #ff4d4d); }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="loader">
        <div class="loader-container">
            <!-- অরবিট ট্র্যাক এবং ঘূর্ণনশীল ডট -->
            <div class="orbit-track"></div>
            
            <!-- গ্লাস ফ্রন্ট কোর -->
            <div class="glass-core">
                <i class="fas fa-tv tv-icon"></i>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        </div>
        <div class="loading-text">CONNECTING</div>
    </div>
    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "exactfit",
            skin: { name: "glow" },
            displaytitle: false
        });

        player.on("ready", () => {
            player.setMute(false);
            player.setVolume(100);
        });

        player.on("play", () => {
            document.getElementById("loader").classList.add("hide-now");
        });

        player.on("buffer", () => {
            document.getElementById("loader").classList.remove("hide-now");
        });

        player.on("error", () => {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now"); 
            loader.innerHTML = `
                <div class="error-content">
                    <i class="fas fa-exclamation-circle"></i>
                    <p style="margin-bottom:12px; font-weight:600; font-size:13px; letter-spacing:1px;">STREAM OFFLINE</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            `;
        });

    } else {
        document.getElementById("loader").innerHTML = '<div class="brand-name">No Stream URL Found</div>';
    }
</script>

</body>
</html>
