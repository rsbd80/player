<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Player</title>
    
    <!-- ========================================== -->
    <!-- 🔥 JW Player CDN                           -->
    <!-- ========================================== -->
    <script src="https://cdn.jwplayer.com/libraries/7sW7W14Y.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        #player-container {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #jwplayer-container {
            width: 100%;
            height: 100%;
        }
        .jwplayer {
            width: 100% !important;
            height: 100% !important;
        }
        .jwplayer video {
            object-fit: fill !important;
        }
        
        /* ফুলস্ক্রিন ফিক্স */
        :-webkit-full-screen { width: 100% !important; height: 100% !important; }
        :-moz-full-screen { width: 100% !important; height: 100% !important; }
        :fullscreen { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="player-container">
        <div id="jwplayer-container"></div>
    </div>
    
    <script>
        // ============================================================
        //  📦 প্লেয়ার কনফিগারেশন
        // ============================================================
        const PLAYER_BASE_URL = "https://rs-player.netlify.app/jw-player?url=";
        const DEFAULT_STREAM = "https://flussonic.deltainfonet.com/01_Tsports_HD/tracks-v1a1/mono.m3u8";
        
        // URL থেকে চ্যানেলের নাম নিন
        const urlParams = new URLSearchParams(window.location.search);
        const channelName = urlParams.get('channel');
        
        // ============================================================
        //  🎬 JW Player Initialize
        // ============================================================
        function loadPlayer(streamUrl) {
            const fullUrl = PLAYER_BASE_URL + encodeURIComponent(streamUrl);
            console.log('▶️ Playing:', fullUrl);
            
            jwplayer('jwplayer-container').setup({
                file: fullUrl,
                width: '100%',
                height: '100%',
                aspectratio: '16:9',
                autostart: true,
                primary: 'html5',
                hlshtml: true,
                controls: true,
                skin: { name: 'vapor' },
                stretching: 'exactfit',
                mute: false,
                repeat: false,
                preload: 'auto'
            });
            
            // প্লেয়ার রেডি হলে লোডার লুকান
            jwplayer().on('ready', function() {
                console.log('✅ Player Ready');
                const loader = document.getElementById('intro-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.visibility = 'hidden';
                }
            });
            
            jwplayer().on('error', function(e) {
                console.error('❌ Player Error:', e);
            });
        }
        
        // ============================================================
        //  📺 চ্যানেলের URL খুঁজে বের করুন
        // ============================================================
        async function getChannelUrl(channelName) {
            if (!channelName) {
                return DEFAULT_STREAM;
            }
            
            try {
                const JSONBIN_API_KEY = "$2a$10$yxEV5C5whOMmNwLqYCgz2.yjbkZGBdnX1qeT1GUIxO2l0R2V8E2Y6";
                const CHANNELS_BIN_ID = "6a4bac5cda38895dfe3533ca";
                
                const url = `https://api.jsonbin.io/v3/b/${CHANNELS_BIN_ID}/latest`;
                const response = await fetch(url, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                
                if (!response.ok) throw new Error('Failed to load channels');
                
                const data = await response.json();
                const channels = data.record || [];
                
                // চ্যানেলের নাম মিলিয়ে খুঁজুন
                const channel = channels.find(ch => ch.name === channelName);
                if (channel && channel.url) {
                    // URL থেকে প্লেয়ার প্রিফিক্স বাদ দিন (যদি থাকে)
                    let streamUrl = channel.url;
                    if (streamUrl.includes('jw-player?url=')) {
                        streamUrl = streamUrl.split('jw-player?url=')[1];
                    }
                    return streamUrl;
                }
                
                return DEFAULT_STREAM;
                
            } catch (error) {
                console.error('❌ Error loading channel:', error);
                return DEFAULT_STREAM;
            }
        }
        
        // ============================================================
        //  🚀 অ্যাপ শুরু করুন
        // ============================================================
        async function init() {
            const streamUrl = await getChannelUrl(channelName);
            loadPlayer(streamUrl);
        }
        
        // শুরু করুন
        init();
        
        // ============================================================
        //  🔥 ফুলস্ক্রিন অটো
        // ============================================================
        function goFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen().catch(() => {});
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            } else if (el.msRequestFullscreen) {
                el.msRequestFullscreen();
            }
        }
        
        // ক্লিক/টাচে ফুলস্ক্রিন
        document.addEventListener('click', goFullscreen, { once: true });
        document.addEventListener('touchstart', goFullscreen, { once: true });
        
        // রোটেশনে ফুলস্ক্রিন ধরে রাখুন
        window.addEventListener('orientationchange', function() {
            setTimeout(goFullscreen, 500);
        });
        
        // ফুলস্ক্রিন থেকে বের হলে আবার ফুলস্ক্রিন
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                setTimeout(goFullscreen, 300);
            }
        });
    </script>
</body>
</html>
