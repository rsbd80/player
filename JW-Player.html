<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#050505; overflow:hidden; position: fixed; }
        #player-wrapper { position: relative; width: 100%; height: 100%; }
        #player { width:100% !important; height:100% !important; }

        /* --- ওএসডি ডিসপ্লে --- */
        #channel-osd {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 0, 0, 0.85); border-left: 5px solid #ff007f;
            padding: 8px 18px; border-radius: 6px; font-weight: bold; font-size: 18px;
            color: #fff; display: flex; align-items: center; gap: 6px;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        #channel-osd.show { opacity: 1; visibility: visible; }

        /* --- রিমোট আইকন (কোনো লেখা নেই) --- */
        #remote-toggle-icon {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 105; color: #00c3ff; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        /* --- রিমোট প্যানেল --- */
        #tv-remote {
            position: absolute; bottom: -500px; left: 50%; transform: translateX(-50%);
            width: 230px; background: rgba(20, 20, 22, 0.95); border: 2px solid #333;
            border-radius: 24px; padding: 15px; z-index: 200; transition: 0.4s;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }
        #tv-remote.open { bottom: 80px; }

        .num-btn { width: 40px; height: 35px; background: #202024; border: 1px solid #333; color: #fff; border-radius: 10px; cursor: pointer; }
        .num-btn:active { background: #00c3ff; }
        
        /* পিসির জন্য বাটন সবসময় শো করার ব্যবস্থা */
        @media (min-width: 768px) {
            #remote-toggle-icon { left: 50%; bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="player-wrapper">
    <!-- চ্যানেল ওএসডি -->
    <div id="channel-osd"><span id="osd-number">CH 01</span></div>

    <!-- রিমোট আইকন (লেখা ছাড়া) -->
    <div id="remote-toggle-icon" onclick="toggleRemote()">
        <i class="fas fa-tv"></i>
    </div>

    <!-- রিমোট প্যানেল -->
    <div id="tv-remote">
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;">
            <button class="num-btn" onclick="pressNum(1)">1</button><button class="num-btn" onclick="pressNum(2)">2</button><button class="num-btn" onclick="pressNum(3)">3</button>
            <button class="num-btn" onclick="pressNum(4)">4</button><button class="num-btn" onclick="pressNum(5)">5</button><button class="num-btn" onclick="pressNum(6)">6</button>
            <button class="num-btn" onclick="pressNum(7)">7</button><button class="num-btn" onclick="pressNum(8)">8</button><button class="num-btn" onclick="pressNum(9)">9</button>
            <div></div><button class="num-btn" onclick="pressNum(0)">0</button>
        </div>
    </div>

    <div id="player"></div>
</div>

<script>
    const channels = { 1: "URL1", 2: "URL2", 12: "URL12" };
    const player = jwplayer("player").setup({ playlist: [{ file: channels[1], type: "hls" }], width: "100%", height: "100%" });

    function toggleRemote() { document.getElementById("tv-remote").classList.toggle("open"); }

    function pressNum(n) {
        document.getElementById("osd-number").innerText = "CH " + n;
        document.getElementById("channel-osd").classList.add("show");
        setTimeout(() => document.getElementById("channel-osd").classList.remove("show"), 2000);
        
        if (channels[n]) {
            player.load([{ file: channels[n], type: "hls" }]);
            player.play();
        }
    }
</script>

</body>
</html>
