<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RS Live · Fullscreen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }
        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: cover;
        }
        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }
        .plyr__controls { z-index: 20; }
        #loading {
            position: fixed; inset: 0; z-index: 999;
            background: #0a0a0a;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
            color: rgba(255,255,255,0.3);
            font-family: system-ui; font-size: 0.9rem; letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
        }
        #loading.hidden { opacity: 0; }
    </style>
</head>
<body>

    <div id="loading">● loading</div>
    <video id="player" playsinline muted autoplay></video>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

    <script>
    (function() {
        'use strict';

        const video = document.getElementById('player');
        const loading = document.getElementById('loading');
        const src = new URLSearchParams(window.location.search).get('url');

        let plyr = null;
        let hls = null;

        // ----- ROTATION -----
        function getAngle() {
            // modern API
            if (screen.orientation) {
                const type = screen.orientation.type;
                if (type === 'portrait-primary') return 0;
                if (type === 'portrait-secondary') return 180;
                if (type === 'landscape-primary') return 90;
                if (type === 'landscape-secondary') return -90;
            }
            // fallback: window size
            return window.innerWidth > window.innerHeight ? 90 : 0;
        }

        function applyRotation() {
            const angle = getAngle();
            video.style.transform = `rotate(${angle}deg)`;
            video.style.objectFit = 'cover';
        }

        // ----- HLS + PLYR -----
        function initPlayer() {
            // destroy previous
            if (plyr) { plyr.destroy(); plyr = null; }
            if (hls) { hls.destroy(); hls = null; }

            if (!src) {
                loading.classList.add('hidden');
                return;
            }

            // Plyr (empty video element)
            plyr = new Plyr(video, {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                autoplay: true,
                muted: true,
            });

            // HLS
            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: true });
                hls.loadSource(src);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loading.classList.add('hidden');
                    video.play().catch(() => {});
                });

                // error fallback
                hls.on(Hls.Events.ERROR, () => {
                    loading.classList.add('hidden');
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
                video.addEventListener('loadedmetadata', () => {
                    loading.classList.add('hidden');
                    video.play().catch(() => {});
                });
            } else {
                loading.classList.add('hidden');
            }

            // rotation events
            plyr.on('ready', applyRotation);
            plyr.on('fullscreenchange', () => setTimeout(applyRotation, 200));

            // fullscreen native
            document.addEventListener('fullscreenchange', () => setTimeout(applyRotation, 200));
            document.addEventListener('webkitfullscreenchange', () => setTimeout(applyRotation, 200));
        }

        // ----- ORIENTATION EVENTS -----
        function attachOrientation() {
            const handler = () => setTimeout(applyRotation, 200);

            if (screen.orientation) {
                screen.orientation.addEventListener('change', handler);
            }

            window.addEventListener('orientationchange', handler);
            window.addEventListener('resize', handler);

            // also on visibility change (some devices rotate after wake)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) setTimeout(applyRotation, 300);
            });
        }

        // ----- START -----
        document.addEventListener('DOMContentLoaded', () => {
            initPlayer();
            attachOrientation();
            // initial rotation
            setTimeout(applyRotation, 300);
        });

        // expose for debug
        window.__fixRotation = applyRotation;

    })();
    </script>
</body>
</html>
