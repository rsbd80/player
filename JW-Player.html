<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RS Live TV</title>

    <!-- PWA Manifest (Add to Home Screen) -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUlMgTGl2ZSBUViIsInNob3J0X25hbWUiOiJSU0xpdmUiLCJzdGFydF91cmwiOiIuIiwiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vaS5wb3N0aW1nLmNjL21EMVZDdDJDL1JTLUxpdmUucG5nIiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3BuZyJ9XSwib3JpZW50YXRpb24iOiJhbnkifQ==" />

    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />

    <style>
        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ===== VIDEO PLAYER ===== */
        #player {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: block;
            object-fit: cover;
            /* 🔒 LOCK: NEVER ROTATE */
            transform: none !important;
            rotate: 0deg !important;
        }

        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            background: #000;
        }

        .plyr__controls {
            z-index: 20;
        }

        /* ===== LOADING OVERLAY ===== */
        #loading-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #12121c 0%, #06060c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* brand - small & premium */
        .loader-brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #ffffff 10%, #8ad7ff 55%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.08);
            line-height: 1.2;
        }
        .loader-brand span {
            background: linear-gradient(90deg, #ff296d 0%, #ff5e00 45%, #ffd000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-sub {
            font-size: 8px;
            color: #5a6f89;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 2px;
            opacity: 0.5;
        }

        /* spinner - minimal */
        .loader-spinner {
            margin-top: 14px;
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: #00f0ff;
            border-right-color: #ff296d;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== FULLSCREEN: FORCE NO ROTATION ===== */
        :-webkit-full-screen #player,
        :-moz-full-screen #player,
        :fullscreen #player,
        #player:-webkit-full-screen,
        #player:-moz-full-screen,
        #player:fullscreen {
            transform: none !important;
            rotate: 0deg !important;
        }

        :-webkit-full-screen .plyr--video,
        :-moz-full-screen .plyr--video,
        :fullscreen .plyr--video {
            transform: none !important;
            rotate: 0deg !important;
        }

        video:fullscreen,
        video:-webkit-full-screen,
        video:-moz-full-screen {
            transform: none !important;
            rotate: 0deg !important;
        }

        /* ===== RESPONSIVE: smaller text on very small screens ===== */
        @media (max-width: 400px) {
            .loader-brand { font-size: 18px; }
            .loader-sub { font-size: 7px; letter-spacing: 2px; }
            .loader-spinner { width: 22px; height: 22px; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <!-- ===== LOADING OVERLAY ===== -->
    <div id="loading-overlay">
        <div class="loader-brand">RS <span>LIVE TV</span></div>
        <div class="loader-sub">loading stream</div>
        <div class="loader-spinner"></div>
    </div>

    <!-- ===== VIDEO ELEMENT ===== -->
    <video id="player" playsinline muted autoplay></video>

    <!-- ===== PLYR + HLS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            const video = document.getElementById('player');
            const overlay = document.getElementById('loading-overlay');

            // Get video URL from query parameter
            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url') || 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

            let plyr = null;
            let hls = null;
            let isHidden = false;

            // ----- Hide Loading -----
            function hideLoading() {
                if (isHidden) return;
                isHidden = true;
                overlay.classList.add('hidden');
            }

            // Fallback: hide after 5 seconds
            const fallbackTimer = setTimeout(hideLoading, 5000);

            // ----- FORCE: No Rotation EVER -----
            function lockRotation() {
                video.style.transform = 'none';
                video.style.rotate = '0deg';
                video.style.objectFit = 'cover';
            }

            // ----- Initialize Plyr -----
            function initPlyr() {
                if (plyr) return;

                plyr = new Plyr(video, {
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                    autoplay: true,
                    muted: true,
                });

                plyr.on('ready', lockRotation);

                // Fullscreen events
                plyr.on('fullscreenchange', function() {
                    setTimeout(lockRotation, 100);
                });

                // Native fullscreen events
                document.addEventListener('fullscreenchange', function() {
                    setTimeout(lockRotation, 100);
                });
                document.addEventListener('webkitfullscreenchange', function() {
                    setTimeout(lockRotation, 100);
                });

                // Orientation / resize
                window.addEventListener('resize', lockRotation);
                window.addEventListener('orientationchange', function() {
                    setTimeout(lockRotation, 150);
                });

                if (screen.orientation) {
                    screen.orientation.addEventListener('change', function() {
                        setTimeout(lockRotation, 150);
                    });
                }

                // MutationObserver: if anything changes transform, fix it
                const observer = new MutationObserver(function() {
                    if (video.style.transform !== 'none' || video.style.rotate !== '0deg') {
                        lockRotation();
                    }
                });
                observer.observe(video, { attributes: true, attributeFilter: ['style'] });
            }

            // ----- Setup HLS -----
            function setupHls() {
                if (!videoSrc) {
                    hideLoading();
                    return;
                }

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });

                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                        video.play().catch(function() {});
                    });

                    hls.on(Hls.Events.ERROR, function(event, data) {
                        // if fatal error, try to recover
                        if (data.fatal) {
                            clearTimeout(fallbackTimer);
                            hideLoading();
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Native HLS (Safari)
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function() {
                        clearTimeout(fallbackTimer);
                        hideLoading();
                        video.play().catch(function() {});
                    });
                } else {
                    hideLoading();
                }
            }

            // ----- START -----
            document.addEventListener('DOMContentLoaded', function() {
                setupHls();
                initPlyr();
                lockRotation();

                // Additional events to hide loading
                video.addEventListener('canplay', function() {
                    clearTimeout(fallbackTimer);
                    hideLoading();
                });
                video.addEventListener('loadeddata', function() {
                    clearTimeout(fallbackTimer);
                    hideLoading();
                });

                // Expose for debugging
                window.__RS = { video, plyr, hls, lockRotation, hideLoading };
            });

        })();
    </script>
</body>
</html>
