<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fullscreen Video with Rotation</title>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
    <style>
        /* রিসেট – সব কিছু পুরো স্ক্রিন */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        /* Plyr কন্টেইনার পুরো স্ক্রিন */
        .plyr--video {
            width: 100vw !important;
            height: 100vh !important;
        }

        /* ভিডিও এলিমেন্ট – কভার + রোটেশন প্রস্তুত */
        #player {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;   /* ফাঁকা জায়গা থাকবে না */
            background: #000;
            transform-origin: center center;
            transition: transform 0.2s ease;
        }

        /* কন্ট্রোল ওভারলে ঠিক রাখা */
        .plyr__controls {
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="player" playsinline muted autoplay controls>
        <source type="application/vnd.apple.mpegurl" src="" />
    </video>

    <!-- লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            // ---------- ১. URL থেকে সোর্স পড়ি ----------
            const urlParams = new URLSearchParams(window.location.search);
            const videoSrc = urlParams.get('url');
            const video = document.getElementById('player');

            if (videoSrc) {
                video.querySelector('source').src = videoSrc;
                video.load();
            }

            // ---------- ২. Plyr ইনিশিয়ালাইজ ----------
            let player;
            document.addEventListener('DOMContentLoaded', function() {
                player = new Plyr(video, {
                    fullscreen: { enabled: true, fallback: true, iosNative: true },
                    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume',
                        'fullscreen'
                    ]
                });

                // ---------- ৩. HLS সাপোর্ট ----------
                if (Hls.isSupported() && videoSrc) {
                    const hls = new Hls();
                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(function() {});
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                }

                // ---------- ৪. প্রাথমিক রোটেশন সেট ----------
                setTimeout(applyCurrentRotation, 500);
            });

            // ---------- ৫. রোটেশন ফাংশন ----------
            function applyRotation(angle) {
                if (!video) return;
                video.style.transform = 'rotate(' + angle + 'deg)';
                video.style.objectFit = 'cover';
                console.log('🔄 রোটেশন প্রয়োগ: ' + angle + '°');
            }

            // ---------- ৬. ওরিয়েন্টেশন ডিটেক্ট (সব পদ্ধতি) ----------
            function getOrientationAngle() {
                // পদ্ধতি ১: window.orientation (iOS, পুরনো Android)
                if (typeof window.orientation !== 'undefined' && window.orientation !== null) {
                    return window.orientation; // 0, 90, -90, 180
                }
                // পদ্ধতি ২: screen.orientation API (আধুনিক)
                if (screen.orientation) {
                    var type = screen.orientation.type;
                    if (type.includes('portrait-primary')) return 0;
                    if (type.includes('portrait-secondary')) return 180;
                    if (type.includes('landscape-primary')) return 90;
                    if (type.includes('landscape-secondary')) return -90;
                }
                // পদ্ধতি ৩: width/height তুলনা (ফ্যালব্যাক)
                if (window.innerWidth > window.innerHeight) {
                    return 90; // ল্যান্ডস্কেপ
                } else {
                    return 0; // পোর্ট্রেট
                }
            }

            // রোটেশন আপডেট (কল করলেই রিফ্রেশ)
            function applyCurrentRotation() {
                var angle = getOrientationAngle();
                applyRotation(angle);
            }

            // ---------- ৭. ইভেন্ট লিসেনার ----------
            // ওরিয়েন্টেশন চেঞ্জ (পুরনো)
            window.addEventListener('orientationchange', function() {
                setTimeout(applyCurrentRotation, 300);
            });

            // ওরিয়েন্টেশন চেঞ্জ (নতুন API)
            if (screen.orientation) {
                screen.orientation.addEventListener('change', function() {
                    setTimeout(applyCurrentRotation, 300);
                });
            }

            // উইন্ডো রিসাইজ (ডেস্কটপ বা ডিভাইস রোটেট)
            window.addEventListener('resize', function() {
                applyCurrentRotation();
            });

            // ভিডিও মেটাডাটা লোড হলে
            video.addEventListener('loadedmetadata', function() {
                applyCurrentRotation();
            });

            // ফুলস্ক্রিন পরিবর্তন হলে (ওরিয়েন্টেশন চেঞ্জ কাভার করতে)
            document.addEventListener('fullscreenchange', function() {
                setTimeout(applyCurrentRotation, 200);
            });
            document.addEventListener('webkitfullscreenchange', function() {
                setTimeout(applyCurrentRotation, 200);
            });

            // ---------- ৮. ডিবাগের জন্য গ্লোবাল ----------
            window.rotateVideo = applyCurrentRotation;

            console.log('✅ অটো-রোটেশন সক্রিয়। ডিভাইস ঘোরান বা ফুলস্ক্রিন করুন।');
        })();
    </script>
</body>
</html>
